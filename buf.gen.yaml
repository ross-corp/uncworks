version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - module=github.com/uncworks/aot/gen/go
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - module=github.com/uncworks/aot/gen/go
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - module=github.com/uncworks/aot/gen/go
  - remote: buf.build/bufbuild/es
    out: gen/ts
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es
    out: gen/ts
    opt:
      - target=ts
inputs:
  - directory: proto
