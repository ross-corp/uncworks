version: "3"

vars:
  KUBEBUILDER_ASSETS:
    sh: "setup-envtest use --print path 2>/dev/null || echo ''"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # --- Testing ---
  test:
    desc: Run all tests (parallel)
    deps: [test:go, test:web, test:extension]

  test:all:
    desc: Run full test pipeline sequentially (schema → unit → contract → temporal → integration → e2e)
    cmds:
      - task: proto:lint
      - task: proto:breaking
      - task: test:unit
      - task: test:contract
      - task: test:temporal
      - task: test:integration
      - task: test:e2e

  test:go:
    desc: Run Go tests (unit + integration)
    env:
      KUBEBUILDER_ASSETS: "{{.KUBEBUILDER_ASSETS}}"
    cmds:
      - go test ./api/... ./internal/... -count=1

  test:e2e:setup:
    desc: Start Soft-Serve git server and push fixture repos
    cmds:
      - mkdir -p /tmp/aot-e2e-soft-serve
      - |
        SOFT_SERVE_DATA_PATH=/tmp/aot-e2e-soft-serve \
        SOFT_SERVE_GIT_LISTEN_ADDR=0.0.0.0:9418 \
        soft serve &
        echo $! > /tmp/aot-e2e-soft-serve.pid
      - sleep 2
      - SOFT_SERVE_ADDR=localhost:9418 ./test/fixtures/push-fixtures.sh

  test:e2e:teardown:
    desc: Stop Soft-Serve git server
    cmds:
      - kill $(cat /tmp/aot-e2e-soft-serve.pid) 2>/dev/null || true
      - rm -rf /tmp/aot-e2e-soft-serve /tmp/aot-e2e-soft-serve.pid

  test:e2e:go:
    desc: Run Go E2E tests
    cmds:
      - go test ./e2e/... -tags e2e -v -timeout 15m

  test:e2e:playwright:
    desc: Run Playwright E2E tests
    dir: web
    cmds:
      - npx playwright test

  test:e2e:full:
    desc: Run full E2E test suite (setup → Go → Playwright → teardown)
    cmds:
      - task: test:e2e:setup
      - defer: { task: test:e2e:teardown }
      - task: test:e2e:go
      - task: test:e2e:playwright

  test:e2e:
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
    cmds:
      - go test -tags e2e ./e2e/... -v -count=1 -timeout 30m

  test:e2e:api:
    desc: Run E2E tests against in-cluster API server
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
      AOT_API_URL: '{{.AOT_API_URL | default "http://localhost:50055"}}'
      AOT_NAMESPACE: '{{.AOT_NAMESPACE | default "aot"}}'
    cmds:
      - go test ./e2e/... -run TestE2E_API -v -count=1 -timeout 10m

  test:e2e:infra:
    desc: Build images, import into k0s, and run LLM E2E tests
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
      AOT_AGENT_IMAGE: aot-agent:local
      AOT_SIDECAR_IMAGE: aot-sidecar:local
      AOT_INIT_IMAGE: aot-init:local
    cmds:
      - task: k0s:images
      - go test -tags e2e ./e2e/... -run TestE2E_LLM -v -count=1 -timeout 30m

  test:web:
    desc: Run Playwright E2E tests for web dashboard
    dir: web
    cmds:
      - npx playwright test

  test:extension:
    desc: Run pi-aot-extension tests
    dir: packages/pi-aot-extension
    cmds:
      - npx tsx --test src/**/*.test.ts

  test:shared:
    desc: Run @aot/shared tests
    dir: packages/shared
    cmds:
      - npx tsx --test src/**/*.test.ts

  test:contract:
    desc: Run server contract tests (ConnectRPC + protovalidate)
    cmds:
      - go test ./test/contract/... -count=1 -v

  test:temporal:
    desc: Run Temporal workflow tests (requires temporal-workflow-engine)
    cmds:
      - go test ./test/temporal/... -count=1 -v

  test:integration:
    desc: Run integration tests (requires Docker for testcontainers)
    cmds:
      - go test -tags integration ./... -count=1 -v

  test:unit:
    desc: Run unit tests only (fast, no Docker)
    env:
      KUBEBUILDER_ASSETS: "{{.KUBEBUILDER_ASSETS}}"
    cmds:
      - go test -short ./api/... ./internal/... -count=1

  # --- Build ---
  build:
    desc: Build all Go binaries
    cmds:
      - go build -o ./bin/apiserver ./cmd/apiserver
      - go build -o ./bin/controller ./cmd/controller
      - go build -o ./bin/hydration ./cmd/hydration
      - go build -o ./bin/sidecar ./cmd/sidecar
      - go build -o ./bin/aot ./cmd/aot
      - go build -o ./bin/temporal-worker ./cmd/temporal-worker
      - CGO_ENABLED=0 go build -o ./bin/uncworks ./cmd/uncworks

  build:uncworks:
    desc: Build the uncworks CLI for all platforms
    cmds:
      - GOOS=linux  GOARCH=amd64 CGO_ENABLED=0 go build -o ./bin/uncworks-linux-amd64  ./cmd/uncworks
      - GOOS=linux  GOARCH=arm64 CGO_ENABLED=0 go build -o ./bin/uncworks-linux-arm64  ./cmd/uncworks
      - GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o ./bin/uncworks-darwin-amd64 ./cmd/uncworks
      - GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o ./bin/uncworks-darwin-arm64 ./cmd/uncworks

  dev:images:
    desc: Build local images and load them into the colima-uncworks cluster
    vars:
      COLIMA_PROFILE: '{{.COLIMA_PROFILE | default "uncworks"}}'
    cmds:
      - npm install --no-save @bufbuild/protobuf@^2.0.0
      - cd web && npm run build
      - colima nerdctl --profile {{.COLIMA_PROFILE}} -- build --tag aot-controlplane:local --file docker/Dockerfile.controlplane .
      - colima nerdctl --profile {{.COLIMA_PROFILE}} -- build --tag aot-web:local --file docker/Dockerfile.web web/
      - colima nerdctl --profile {{.COLIMA_PROFILE}} -- build --tag aot-sidecar:local --file docker/Dockerfile.sidecar .
      - colima nerdctl --profile {{.COLIMA_PROFILE}} -- build --tag aot-init:local --file docker/Dockerfile.hydration .
      - colima nerdctl --profile {{.COLIMA_PROFILE}} -- build --tag aot-agent:local --file docker/Dockerfile.agent-base .
      - echo "All images loaded into colima-{{.COLIMA_PROFILE}}"

  app:build:
    desc: Build the native macOS app (requires Wails v2 and macOS)
    cmds:
      - |
        if [ "$(uname)" != "Darwin" ]; then
          echo "ERROR: macOS app can only be built on macOS"; exit 1
        fi
      - |
        if ! command -v wails &>/dev/null; then
          echo "ERROR: wails not found. Install with: go install github.com/wailsapp/wails/v2/cmd/wails@latest"
          exit 1
        fi
      - cd cmd/uncworks-app && wails build -clean -o UNCWORKS
      - rm -rf /Applications/UNCWORKS.app
      - cp -r cmd/uncworks-app/build/bin/UNCWORKS.app /Applications/UNCWORKS.app
      - echo "Installed to /Applications/UNCWORKS.app"

  docker:build:
    desc: Build all Docker images locally
    cmds:
      - docker build -f docker/Dockerfile.hydration -t aot-init:local .
      - docker build -f docker/Dockerfile.sidecar -t aot-sidecar:local .
      - docker build -f docker/Dockerfile.agent-base -t aot-agent:local .
      - docker build -f docker/Dockerfile.controlplane -t aot-controlplane:local .
      - docker build -f docker/Dockerfile.web -t aot-web:local web/

  k0s:images:
    desc: Import locally-built Docker images into k0s (requires sudo)
    deps: [docker:build]
    cmds:
      - docker save aot-init:local aot-sidecar:local aot-agent:local aot-controlplane:local aot-web:local -o /tmp/aot-images.tar
      - sudo k0s ctr images import /tmp/aot-images.tar
      - rm /tmp/aot-images.tar
      - echo "Images imported into k0s. Set AOT_*_IMAGE env vars to use local images."

  deploy:all:
    desc: Build all images, import into k0s, restart all deployments
    cmds:
      - task: build:web
      - task: k0s:images
      - kubectl rollout restart deploy/aot-apiserver deploy/aot-controller deploy/aot-worker deploy/aot-web -n aot
      - kubectl rollout status deploy/aot-apiserver deploy/aot-controller deploy/aot-worker deploy/aot-web -n aot --timeout=60s
      - echo "All deployments restarted and ready."

  build:web:
    desc: Build web dashboard
    dir: web
    cmds:
      - npx vite build

  # --- Code Generation ---
  proto:gen:
    desc: Generate Go and TypeScript code from protobuf definitions
    cmds:
      - buf generate --template buf.gen.go.yaml
      - buf generate --template buf.gen.ts.yaml --include-imports

  proto:lint:
    desc: Lint protobuf files
    cmds:
      - buf lint

  proto:breaking:
    desc: Check for breaking proto changes against main
    cmds:
      - buf breaking --against '.git#branch=main'

  # --- Infrastructure ---
  temporal:dev:
    desc: Start Temporal dev server (SQLite, no external deps)
    cmds:
      - temporal server start-dev --db-filename .temporal.db


  k0s:setup:
    desc: "[DEPRECATED] Use 'uncworks setup' instead"
    cmds:
      - echo "ERROR: task k0s:setup is removed. Use 'uncworks setup' instead."
      - echo "       See docs/getting-started.md for the updated local setup guide."
      - exit 1

  k0s:teardown:
    desc: "[DEPRECATED] Use 'uncworks teardown' instead"
    cmds:
      - echo "ERROR: task k0s:teardown is removed. Use 'uncworks teardown' instead."
      - exit 1

  k0s:crd:
    desc: Apply AgentRun CRD to cluster
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
    cmds:
      - kubectl apply -f deploy/crds/agentrun-crd.yaml

  k0s:litellm:
    desc: Deploy LiteLLM proxy to k0s cluster
    cmds:
      - helm repo add litellm https://litellm-helm.github.io/litellm-helm 2>/dev/null || true
      - helm repo update
      - >-
        kubectl create secret generic litellm-master-key
        --from-literal=LITELLM_MASTER_KEY="sk-aot-$(openssl rand -hex 16)"
        --dry-run=client -o yaml | kubectl apply -f -
      - >-
        helm upgrade --install litellm litellm/litellm-helm
        --set masterKeySecretName=litellm-master-key
        --set masterKeySecretKey=LITELLM_MASTER_KEY
        --set-file configFile=deploy/litellm/litellm-config.yaml

  k0s:ollama:
    desc: Deploy Ollama to k0s cluster
    cmds:
      - helm repo add ollama-helm https://otwld.github.io/ollama-helm 2>/dev/null || true
      - helm repo update
      - >-
        helm upgrade --install ollama ollama-helm/ollama
        --set ollama.gpu.enabled=false
        --set resources.requests.memory=8Gi

  k0s:ollama:pull:
    desc: Pull models into running Ollama instance
    cmds:
      - kubectl exec -it deploy/ollama -- ollama pull qwen2.5:0.5b
      - kubectl exec -it deploy/ollama -- ollama pull llama3.1:8b

  k0s:storage:
    desc: Install local-path-provisioner for PVC support
    cmds:
      - kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
      - kubectl patch storageclass local-path -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'

  k0s:soft-serve:
    desc: Deploy soft-serve Git server to k0s cluster
    cmds:
      - kubectl apply -f deploy/crds/project-crd.yaml
      - >-
        kubectl apply -f - <<'YAML'
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: soft-serve-data
          namespace: aot
        spec:
          accessModes: [ReadWriteOnce]
          storageClassName: local-path
          resources:
            requests:
              storage: 2Gi
        YAML
      - >-
        kubectl apply -f - <<'YAML'
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: soft-serve
          namespace: aot
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: soft-serve
          template:
            metadata:
              labels:
                app.kubernetes.io/name: soft-serve
            spec:
              containers:
              - name: soft-serve
                image: charmcli/soft-serve:latest
                ports:
                - {name: ssh, containerPort: 23231}
                - {name: http, containerPort: 23232}
                env:
                - {name: SOFT_SERVE_DATA_PATH, value: /data}
                volumeMounts:
                - {name: data, mountPath: /data}
                resources:
                  requests: {cpu: 100m, memory: 128Mi}
                  limits: {cpu: 500m, memory: 256Mi}
              volumes:
              - name: data
                persistentVolumeClaim:
                  claimName: soft-serve-data
        YAML
      - >-
        kubectl apply -f - <<'YAML'
        apiVersion: v1
        kind: Service
        metadata:
          name: soft-serve
          namespace: aot
        spec:
          selector:
            app.kubernetes.io/name: soft-serve
          ports:
          - {name: ssh, port: 23231, targetPort: ssh}
          - {name: http, port: 23232, targetPort: http}
        YAML
      - kubectl rollout status deploy/soft-serve -n aot --timeout=60s
      - echo "soft-serve deployed. SSH available at soft-serve.aot.svc:23231"

  k0s:deps:
    desc: Deploy all infrastructure dependencies to k0s
    cmds:
      - task: k0s:crd
      - task: k0s:storage
      - task: k0s:ollama
      - task: k0s:litellm
      - task: k0s:soft-serve
      - echo "All dependencies deployed. Run 'task k0s:ollama:pull' to pull models."

  # --- Development ---
  dev:web:
    desc: Start web dashboard dev server
    dir: web
    cmds:
      - npx vite

  install:
    desc: Install all dependencies
    cmds:
      - go mod tidy
      - cd web && npm install
      - cd packages/shared && npm install
      - cd packages/pi-aot-extension && npm install

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run ./...
      - cd web && npx tsc --noEmit
      - cd packages/shared && npx tsc --noEmit
      - cd packages/pi-aot-extension && npx tsc --noEmit

  hooks:install:
    desc: Install git hooks via lefthook
    cmds:
      - lefthook install

  # --- Persistent Dev Cluster ---
  cluster:setup:
    desc: Install systemd units, build/import images, deploy Ollama, start all services
    cmds:
      - loginctl enable-linger $(whoami)
      - mkdir -p ~/.config/systemd/user
      - cp deploy/systemd/aot-*.service deploy/systemd/aot-cluster.target ~/.config/systemd/user/
      - systemctl --user daemon-reload
      - task: build
      - task: k0s:images
      - task: k0s:crd
      - task: k0s:ollama
      - systemctl --user enable aot-temporal aot-controller aot-worker aot-apiserver aot-web aot-cluster.target
      - systemctl --user start aot-cluster.target
      - echo ""
      - echo "Cluster started! Services:"
      - systemctl --user list-units 'aot-*' --no-pager --all
      - echo ""
      - echo "Web UI → http://localhost:3000"
      - echo "API    → http://localhost:50055"
      - echo ""
      - echo "Pull Ollama model (if not already done):"
      - echo "  kubectl exec deploy/ollama -- ollama pull qwen2.5:0.5b"

  cluster:status:
    desc: Show health of all UNCWORKS services and ports
    cmds:
      - echo "=== Systemd Units ==="
      - systemctl --user list-units 'aot-*' --no-pager
      - echo ""
      - echo "=== Listening Ports ==="
      - ss -tlnp 2>/dev/null | grep -E '7233|50055|8095|3000' || echo "(none)"
      - echo ""
      - echo "=== k0s Pods ==="
      - sudo k0s kubectl get pods -A 2>/dev/null || echo "(k0s not running)"

  cluster:teardown:
    desc: Stop all UNCWORKS services and remove systemd units
    cmds:
      - systemctl --user stop aot-cluster.target 2>/dev/null || true
      - systemctl --user disable aot-cluster.target 2>/dev/null || true
      - rm -f ~/.config/systemd/user/aot-*.service ~/.config/systemd/user/aot-cluster.target
      - systemctl --user daemon-reload
      - echo "All UNCWORKS services stopped and units removed."

  cluster:logs:
    desc: Show combined logs from all UNCWORKS services
    cmds:
      - journalctl --user -u 'aot-*' --no-pager -n 100 {{.CLI_ARGS}}
