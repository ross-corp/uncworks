# Taskfile.yml — root entrypoint; delegates to scoped taskfiles in tasks/
# Run `task --list` to see all available tasks.
version: "3"

includes:
  build:
    taskfile: tasks/build.yml
    dir: "{{.ROOT_DIR}}"
  test:
    taskfile: tasks/test.yml
    dir: "{{.ROOT_DIR}}"
  proto:
    taskfile: tasks/proto.yml
    dir: "{{.ROOT_DIR}}"
  docker:
    taskfile: tasks/docker.yml
    dir: "{{.ROOT_DIR}}"
  dev:
    taskfile: tasks/dev.yml
    dir: "{{.ROOT_DIR}}"
  k8s:
    taskfile: tasks/k8s.yml
    dir: "{{.ROOT_DIR}}"
  cluster:
    taskfile: tasks/cluster.yml
    dir: "{{.ROOT_DIR}}"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ---------------------------------------------------------------------------
  # Top-level shortcuts for the most common workflows
  # ---------------------------------------------------------------------------

  build:
    desc: Build all Go binaries (shortcut for build:go)
    cmds:
      - task: build:go

  test:
    desc: Run all tests in parallel (Go + web + extension + layer2)
    deps: [test:go, test:web, test:extension, test:layer2]

  install:
    desc: Install all project dependencies (shortcut for dev:install)
    cmds:
      - task: dev:install

  lint:
    desc: Run all linters (shortcut for dev:lint)
    cmds:
      - task: dev:lint

  # ---------------------------------------------------------------------------
  # Backward-compat aliases for tasks that were renamed or re-namespaced
  # ---------------------------------------------------------------------------

  # build:web and build:uncworks already exist via the build: include.
  # app:build was the old name; build:app is the new canonical name.
  app:build:
    desc: "Compat alias: build native macOS app (use build:app)"
    cmds:
      - task: build:app

  # hooks:install was top-level; now lives under dev:
  hooks:install:
    desc: "Compat alias: install git hooks (use dev:hooks:install)"
    cmds:
      - task: dev:hooks:install

  # temporal:dev was top-level; now lives under cluster:
  temporal:dev:
    desc: "Compat alias: start Temporal dev server (use cluster:temporal:dev)"
    cmds:
      - task: cluster:temporal:dev

  # k0s:* tasks are now under k8s:; keep old names working
  k0s:images:
    desc: "Compat alias: import Docker images into k0s (use k8s:images)"
    cmds:
      - task: k8s:images

  k0s:crd:
    desc: "Compat alias: apply AgentRun CRD (use k8s:crd)"
    cmds:
      - task: k8s:crd

  k0s:storage:
    desc: "Compat alias: install local-path-provisioner (use k8s:storage)"
    cmds:
      - task: k8s:storage

  k0s:litellm:
    desc: "Compat alias: deploy LiteLLM to k0s (use k8s:litellm)"
    cmds:
      - task: k8s:litellm

  k0s:ollama:
    desc: "Compat alias: deploy Ollama to k0s (use k8s:ollama)"
    cmds:
      - task: k8s:ollama

  k0s:ollama:pull:
    desc: "Compat alias: pull Ollama models (use k8s:ollama:pull)"
    cmds:
      - task: k8s:ollama:pull

  k0s:soft-serve:
    desc: "Compat alias: deploy soft-serve Git server (use k8s:soft-serve)"
    cmds:
      - task: k8s:soft-serve

  k0s:deps:
    desc: "Compat alias: deploy all k0s infra dependencies (use k8s:deps)"
    cmds:
      - task: k8s:deps

  k0s:setup:
    desc: "Compat alias: [DEPRECATED] see k8s:setup"
    cmds:
      - task: k8s:setup

  k0s:teardown:
    desc: "Compat alias: [DEPRECATED] see k8s:teardown"
    cmds:
      - task: k8s:teardown

  deploy:all:
    desc: "Compat alias: build + import + rollout all (use k8s:deploy:all)"
    cmds:
      - task: k8s:deploy:all
