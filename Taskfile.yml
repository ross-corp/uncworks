version: "3"

vars:
  KUBEBUILDER_ASSETS:
    sh: "setup-envtest use --print path 2>/dev/null || echo ''"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # --- Testing ---
  test:
    desc: Run all tests (parallel)
    deps: [test:go, test:web, test:extension, test:tui]

  test:all:
    desc: Run full test pipeline sequentially (schema → unit → contract → temporal → integration → e2e)
    cmds:
      - task: proto:lint
      - task: proto:breaking
      - task: test:unit
      - task: test:contract
      - task: test:temporal
      - task: test:integration
      - task: test:e2e

  test:go:
    desc: Run Go tests (unit + integration)
    env:
      KUBEBUILDER_ASSETS: "{{.KUBEBUILDER_ASSETS}}"
    cmds:
      - go test ./api/... ./internal/... -count=1

  test:e2e:setup:
    desc: Deploy E2E prerequisites (CRD, build binaries)
    cmds:
      - task: k0s:crd
      - task: build
      - echo "E2E setup complete. Start apiserver, controller, and temporal-worker manually."

  test:e2e:
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
    cmds:
      - go test -tags e2e ./e2e/... -v -count=1 -timeout 30m

  test:e2e:infra:
    desc: Build images, import into k0s, and run LLM E2E tests
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
      AOT_AGENT_IMAGE: aot-agent:local
      AOT_SIDECAR_IMAGE: aot-sidecar:local
      AOT_INIT_IMAGE: aot-init:local
    cmds:
      - task: k0s:images
      - go test -tags e2e ./e2e/... -run TestE2E_LLM -v -count=1 -timeout 30m

  test:web:
    desc: Run Playwright E2E tests for web dashboard
    dir: web
    cmds:
      - npx playwright test

  test:extension:
    desc: Run pi-aot-extension tests
    dir: packages/pi-aot-extension
    cmds:
      - npx tsx --test src/**/*.test.ts

  test:tui:
    desc: Run TUI tests
    dir: packages/tui
    cmds:
      - npm test

  test:shared:
    desc: Run @aot/shared tests
    dir: packages/shared
    cmds:
      - npx tsx --test src/**/*.test.ts

  test:contract:
    desc: Run server contract tests (ConnectRPC + protovalidate)
    cmds:
      - go test ./test/contract/... -count=1 -v

  test:temporal:
    desc: Run Temporal workflow tests (requires temporal-workflow-engine)
    cmds:
      - go test ./test/temporal/... -count=1 -v

  test:integration:
    desc: Run integration tests (requires Docker for testcontainers)
    cmds:
      - go test -tags integration ./... -count=1 -v

  test:unit:
    desc: Run unit tests only (fast, no Docker)
    env:
      KUBEBUILDER_ASSETS: "{{.KUBEBUILDER_ASSETS}}"
    cmds:
      - go test -short ./api/... ./internal/... -count=1

  # --- Build ---
  build:
    desc: Build all Go binaries
    cmds:
      - go build -o ./bin/apiserver ./cmd/apiserver
      - go build -o ./bin/controller ./cmd/controller
      - go build -o ./bin/hydration ./cmd/hydration
      - go build -o ./bin/sidecar ./cmd/sidecar
      - go build -o ./bin/aot ./cmd/aot
      - go build -o ./bin/temporal-worker ./cmd/temporal-worker

  docker:build:
    desc: Build all agent pod Docker images locally
    cmds:
      - docker build -f docker/Dockerfile.hydration -t aot-init:local .
      - docker build -f docker/Dockerfile.sidecar -t aot-sidecar:local .
      - docker build -f docker/Dockerfile.agent-base -t aot-agent:local .

  k0s:images:
    desc: Import locally-built Docker images into k0s (requires sudo)
    deps: [docker:build]
    cmds:
      - docker save aot-init:local aot-sidecar:local aot-agent:local -o /tmp/aot-images.tar
      - sudo k0s ctr images import /tmp/aot-images.tar
      - rm /tmp/aot-images.tar
      - echo "Images imported into k0s. Set AOT_*_IMAGE env vars to use local images."

  build:web:
    desc: Build web dashboard
    dir: web
    cmds:
      - npx vite build

  # --- Code Generation ---
  proto:gen:
    desc: Generate Go and TypeScript code from protobuf definitions
    cmds:
      - buf generate --template buf.gen.go.yaml
      - buf generate --template buf.gen.ts.yaml --include-imports

  proto:lint:
    desc: Lint protobuf files
    cmds:
      - buf lint

  proto:breaking:
    desc: Check for breaking proto changes against main
    cmds:
      - buf breaking --against '.git#branch=main'

  # --- Infrastructure ---
  temporal:dev:
    desc: Start Temporal dev server (SQLite, no external deps)
    cmds:
      - temporal server start-dev --db-filename .temporal.db


  k0s:setup:
    desc: Initialize local k0s cluster (requires sudo)
    cmds:
      - sudo ./hack/k0s-setup.sh

  k0s:teardown:
    desc: Tear down local k0s cluster (requires sudo)
    cmds:
      - sudo ./hack/k0s-teardown.sh

  k0s:crd:
    desc: Apply AgentRun CRD to cluster
    env:
      KUBECONFIG: '{{.KUBECONFIG | default "kubeconfig"}}'
    cmds:
      - kubectl apply -f deploy/crds/agentrun-crd.yaml

  k0s:litellm:
    desc: Deploy LiteLLM proxy to k0s cluster
    cmds:
      - helm repo add litellm https://litellm-helm.github.io/litellm-helm 2>/dev/null || true
      - helm repo update
      - >-
        kubectl create secret generic litellm-master-key
        --from-literal=LITELLM_MASTER_KEY="sk-aot-$(openssl rand -hex 16)"
        --dry-run=client -o yaml | kubectl apply -f -
      - >-
        helm upgrade --install litellm litellm/litellm-helm
        --set masterKeySecretName=litellm-master-key
        --set masterKeySecretKey=LITELLM_MASTER_KEY
        --set-file configFile=deploy/litellm/litellm-config.yaml

  k0s:ollama:
    desc: Deploy Ollama to k0s cluster
    cmds:
      - helm repo add ollama-helm https://otwld.github.io/ollama-helm 2>/dev/null || true
      - helm repo update
      - >-
        helm upgrade --install ollama ollama-helm/ollama
        --set ollama.gpu.enabled=false
        --set resources.requests.memory=8Gi

  k0s:ollama:pull:
    desc: Pull models into running Ollama instance
    cmds:
      - kubectl exec -it deploy/ollama -- ollama pull qwen2.5:0.5b
      - kubectl exec -it deploy/ollama -- ollama pull llama3.1:8b

  k0s:deps:
    desc: Deploy all infrastructure dependencies to k0s
    cmds:
      - task: k0s:crd
      - task: k0s:ollama
      - task: k0s:litellm
      - echo "All dependencies deployed. Run 'task k0s:ollama:pull' to pull models."

  # --- Development ---
  dev:tui:
    desc: Start interactive TUI dashboard
    dir: packages/tui
    cmds:
      - node --import tsx src/main.ts {{.CLI_ARGS}}

  dev:web:
    desc: Start web dashboard dev server
    dir: web
    cmds:
      - npx vite

  install:
    desc: Install all dependencies
    cmds:
      - go mod tidy
      - cd web && npm install
      - cd packages/shared && npm install
      - cd packages/pi-aot-extension && npm install
      - cd packages/tui && npm install

  lint:
    desc: Run linters
    cmds:
      - golangci-lint run ./...
      - cd web && npx tsc --noEmit
      - cd packages/shared && npx tsc --noEmit
      - cd packages/pi-aot-extension && npx tsc --noEmit

  hooks:install:
    desc: Install git hooks via lefthook
    cmds:
      - lefthook install

  # --- Persistent Dev Cluster ---
  cluster:setup:
    desc: Install systemd units, build/import images, deploy Ollama, start all services
    cmds:
      - loginctl enable-linger $(whoami)
      - mkdir -p ~/.config/systemd/user
      - cp deploy/systemd/aot-*.service deploy/systemd/aot-cluster.target ~/.config/systemd/user/
      - systemctl --user daemon-reload
      - task: build
      - task: k0s:images
      - task: k0s:crd
      - task: k0s:ollama
      - systemctl --user enable aot-temporal aot-controller aot-worker aot-apiserver aot-web aot-cluster.target
      - systemctl --user start aot-cluster.target
      - echo ""
      - echo "Cluster started! Services:"
      - systemctl --user list-units 'aot-*' --no-pager --all
      - echo ""
      - echo "Web UI → http://localhost:3000"
      - echo "API    → http://localhost:50055"
      - echo ""
      - echo "Pull Ollama model (if not already done):"
      - echo "  kubectl exec deploy/ollama -- ollama pull qwen2.5:0.5b"

  cluster:status:
    desc: Show health of all AOT services and ports
    cmds:
      - echo "=== Systemd Units ==="
      - systemctl --user list-units 'aot-*' --no-pager
      - echo ""
      - echo "=== Listening Ports ==="
      - ss -tlnp 2>/dev/null | grep -E '7233|50055|8095|3000' || echo "(none)"
      - echo ""
      - echo "=== k0s Pods ==="
      - sudo k0s kubectl get pods -A 2>/dev/null || echo "(k0s not running)"

  cluster:teardown:
    desc: Stop all AOT services and remove systemd units
    cmds:
      - systemctl --user stop aot-cluster.target 2>/dev/null || true
      - systemctl --user disable aot-cluster.target 2>/dev/null || true
      - rm -f ~/.config/systemd/user/aot-*.service ~/.config/systemd/user/aot-cluster.target
      - systemctl --user daemon-reload
      - echo "All AOT services stopped and units removed."

  cluster:logs:
    desc: Show combined logs from all AOT services
    cmds:
      - journalctl --user -u 'aot-*' --no-pager -n 100 {{.CLI_ARGS}}
