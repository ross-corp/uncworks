server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ConnectRPC (gRPC-Web) to API server
    location /aot.api.v1.AOTService/ {
        proxy_pass http://aot-apiserver.aot.svc.cluster.local:50055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
    }

    # Proxy REST API endpoints to API server
    location /api/ {
        proxy_pass http://aot-apiserver.aot.svc.cluster.local:50055;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
