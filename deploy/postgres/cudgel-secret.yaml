# cudgel-db-credentials Secret
# Apply after creating the cudgel database and user (see migrations/002_cudgel_db.sql).
# Replace the CUDGEL_DATABASE_URL value with the actual DSN before applying.
#
# Example DSN: postgres://cudgel:<password>@postgres.aot.svc.cluster.local:5432/cudgel?sslmode=disable
#
# Create with:
#   kubectl -n aot create secret generic cudgel-db-credentials \
#     --from-literal=CUDGEL_DATABASE_URL="postgres://cudgel:<password>@postgres.aot.svc.cluster.local:5432/cudgel?sslmode=disable"
#
# Or apply this manifest (base64-encode the value first):
apiVersion: v1
kind: Secret
metadata:
  name: cudgel-db-credentials
  namespace: aot
type: Opaque
stringData:
  # Replace with actual connection string before applying
  CUDGEL_DATABASE_URL: "postgres://cudgel:CHANGE_ME@postgres.aot.svc.cluster.local:5432/cudgel?sslmode=disable"
