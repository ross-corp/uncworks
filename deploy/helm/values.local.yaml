# values.local.yaml — Helm values for local development on a laptop cluster.
# Usage: helm upgrade --install uncworks oci://ghcr.io/uncworks/charts/aot \
#            -f deploy/helm/values.local.yaml --set temporal.host=<addr> ...
#
# Compatible with: Docker Desktop, OrbStack, Rancher Desktop, Colima, k3d, kind.

# Expose the web UI on a known NodePort so uncworks open can find it.
# Docker Desktop, OrbStack, and Rancher Desktop route localhost:<nodePort> directly.
# Colima and minikube users: use 'uncworks open' which runs kubectl port-forward instead.
web:
  service:
    type: NodePort
    nodePort: 30300
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

bff:
  service:
    type: NodePort
    nodePort: ""  # unset; bff is optional, use web NodePort above
  resources:
    requests:
      cpu: 50m
      memory: 64Mi

apiserver:
  # Mount the local-path-provisioner data directory so the apiserver can read
  # logs, traces, and workspace files from completed runs (pods scaled to 0).
  # Common paths by cluster tool:
  #   OrbStack / Docker Desktop:   /opt/local-path-provisioner
  #   k3s / k3d / Rancher Desktop: /var/lib/rancher/k3s/storage
  #   kind:                        /var/local-path-provisioner
  pvcDataHostPath: "/var/lib/rancher/k3s/storage"
  pvcDataRunAsRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

worker:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

controller:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# soft-serve: disable for local installs (no SSH key setup required).
# Projects will not have config repos, but basic agent runs work fine.
softServe:
  enabled: false

# Ollama is disabled by default — most local users route to OpenRouter or OpenAI.
# To enable: add --set ollama.enabled=true to your helm command.
# Note: Ollama requires ~4GB disk and is GPU/CPU intensive.
ollama:
  enabled: false

# Storage: leave storageClass unset to use the cluster's default provisioner.
# All common local cluster tools (Docker Desktop, OrbStack, k3d, kind) provide
# a working default storage class for ReadWriteOnce PVCs.
