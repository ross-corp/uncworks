apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.aot.uncworks.io
spec:
  group: aot.uncworks.io
  names:
    kind: Project
    listKind: ProjectList
    plural: projects
    singular: project
    shortNames:
      - proj
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Repos
          type: integer
          jsonPath: .status.runCount
        - name: Config Ready
          type: boolean
          jsonPath: .status.configRepoReady
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                displayName:
                  type: string
                  maxLength: 128
                description:
                  type: string
                  maxLength: 1024
                repos:
                  type: array
                  items:
                    type: object
                    properties:
                      url:
                        type: string
                      branch:
                        type: string
                      path:
                        type: string
                    required:
                      - url
                devbox:
                  type: object
                  properties:
                    packages:
                      type: array
                      items:
                        type: string
                defaults:
                  type: object
                  properties:
                    modelTier:
                      type: string
                    manageModelTier:
                      type: string
                    implementModelTier:
                      type: string
                    ttlSeconds:
                      type: integer
                      format: int32
                    orchestrationMode:
                      type: string
                      enum:
                        - single
                        - auto
                        - manual
                        - spec-driven
                    autoPush:
                      type: boolean
                    autoPR:
                      type: boolean
                    prBaseBranch:
                      type: string
                ide:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    image:
                      type: string
                    idleTimeoutMinutes:
                      type: integer
                      format: int32
                ssh:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    authorizedKeys:
                      type: array
                      items:
                        type: string
            status:
              type: object
              properties:
                configRepoReady:
                  type: boolean
                configRepoURL:
                  type: string
                ideActive:
                  type: boolean
                idePodName:
                  type: string
                runCount:
                  type: integer
                  format: int32
                lastRunId:
                  type: string
                lastRunAt:
                  type: string
                  format: date-time
                totalCost:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
