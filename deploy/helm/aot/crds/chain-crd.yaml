apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chains.aot.uncworks.io
spec:
  group: aot.uncworks.io
  names:
    kind: Chain
    listKind: ChainList
    plural: chains
    singular: chain
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Steps
          type: integer
          jsonPath: .spec.steps
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - steps
              properties:
                displayName:
                  type: string
                  description: Human-readable chain name.
                  maxLength: 128
                description:
                  type: string
                  description: Explains what this chain does.
                  maxLength: 1024
                projectRef:
                  type: string
                  description: References a Project for context.
                steps:
                  type: array
                  description: DAG of execution steps.
                  items:
                    type: object
                    required:
                      - name
                      - templateRef
                    properties:
                      name:
                        type: string
                        description: Unique identifier for this step within the chain.
                      templateRef:
                        type: string
                        description: References a RunTemplate by name.
                      dependsOn:
                        type: array
                        description: Step names that must complete before this step starts.
                        items:
                          type: string
                      contextFrom:
                        type: string
                        description: Names a step whose output summary is injected into this step's prompt.
                      branchFrom:
                        type: string
                        description: Names a step whose git branch is used as this step's source branch.
                      condition:
                        type: string
                        description: CEL expression evaluated against parent step results. If empty, the step runs unconditionally when dependencies are met.
