# Development overrides for local k0s cluster.
# Usage: helm install aot ./deploy/helm/aot -f deploy/helm/aot/dev-values.yaml
github:
  tokenSecretName: "github-token"

softServe:
  enabled: true

cudgel:
  enabled: true
  image: ghcr.io/uncworks/aot-cudgel-shim:latest
  endpoint: "http://cudgel.aot.svc.cluster.local:8080"
  resources:
    cpu: 250m
    memory: 256Mi
