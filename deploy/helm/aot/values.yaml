# -- NetworkPolicy — set enabled: true only if your CNI enforces policies
networkPolicy:
  enabled: false

# -- Ingress configuration
ingress:
  # -- Tailscale ingress — requires the Tailscale Kubernetes operator installed in the cluster.
  # Set enabled: true and provide hostnames to expose UNCWORKS on your tailnet.
  tailscale:
    enabled: false
    # -- Tailscale hostname for the web dashboard (e.g. "uncworks.your-tailnet.ts.net")
    webHostname: ""
    # -- Tailscale hostname for the API server ConnectRPC/gRPC endpoint (e.g. "uncworks-api.your-tailnet.ts.net")
    apiserverHostname: ""

# -- Temporal configuration (required)
temporal:
  # -- Temporal Frontend gRPC address (e.g. "temporal:7233")
  host: ""
  # -- Temporal namespace
  namespace: default

# -- Log level for all control-plane components (apiserver, controller).
# Valid values: debug, info, warn, error. Defaults to "info" when unset.
logLevel: ""
# -- Log format for all control-plane components (apiserver).
# Set to "json" for structured log ingestion; defaults to auto-detect (text for TTY, JSON otherwise).
logFormat: ""

# -- LLM endpoint configuration (optional)
llm:
  # -- LiteLLM/Ollama/OpenAI base URL (e.g. "http://ollama:11434")
  baseUrl: ""
  # -- API key for the LLM endpoint (dev convenience only — use masterKeySecretName in production)
  apiKey: ""
  # -- Secret name containing the LiteLLM master key (key: "LITELLM_MASTER_KEY").
  # Preferred over llm.apiKey in production. Takes precedence when both are set.
  masterKeySecretName: ""

# -- GitHub integration
github:
  # -- Name of the k8s Secret containing the GitHub token.
  # Secret must have a key named "token".
  # Create with: kubectl -n aot create secret generic github-token --from-literal=token=ghp_xxx
  tokenSecretName: ""
  # -- GitHub webhook configuration. When set, the apiserver accepts push/PR events
  # from GitHub and can trigger agent runs automatically (e.g. CI autofix).
  webhook:
    # -- Shared secret for HMAC-SHA256 signature validation. Must match the value
    # configured in your GitHub repository/org webhook settings.
    # Provide via secretName (preferred) or secret (dev convenience).
    secretName: ""
    secret: ""
    # -- Comma-separated list of "owner/repo" strings that may deliver webhooks.
    # Leave empty to allow any repo (not recommended for production).
    repos: ""
    # -- Maximum number of CI autofix retry attempts per PR.
    ciAutofixMaxRetries: 3

# -- Container image references
images:
  controlplane:
    repository: ghcr.io/uncworks/aot-controlplane
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  init:
    repository: ghcr.io/uncworks/aot-init
    tag: ""
    pullPolicy: IfNotPresent
  sidecar:
    repository: ghcr.io/uncworks/aot-sidecar
    tag: ""
    pullPolicy: IfNotPresent
  agent:
    repository: ghcr.io/uncworks/aot-agent
    tag: ""
    pullPolicy: IfNotPresent
  web:
    repository: nginxinc/nginx-unprivileged
    tag: "stable-alpine"
    pullPolicy: IfNotPresent
  bff:
    repository: ghcr.io/uncworks/aot-bff
    tag: ""
    pullPolicy: IfNotPresent

# -- Controller configuration
controller:
  replicas: 1
  metricsPort: 8095
  # -- Number of days to retain Deployments and PVCs for completed runs before cleanup
  retentionDays: 7
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# -- Temporal Worker configuration
worker:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # -- PostgreSQL DSN for the brain (long-term memory) store.
  # When set, knowledge activities (persist, embed, hydrate) are enabled.
  # Format: "postgres://user:pass@host:5432/dbname"
  brainDatabaseURL: ""
  # -- Maximum number of connections in the brain DB pool (BRAIN_DB_MAX_CONNS). Default: 10.
  brainDBMaxConns: ""
  # -- Minimum number of connections kept alive in the brain DB pool (BRAIN_DB_MIN_CONNS). Default: 2.
  brainDBMinConns: ""
  # -- Base URL of the embedder service (e.g. "http://ollama:11434").
  # Requires brainDatabaseURL to also be set. When unset, embedding is skipped.
  embedderBaseURL: ""
  # -- Model name for the embedder. Defaults to the embedder's built-in default when empty.
  embedderModel: ""

# -- API Server configuration
apiserver:
  replicas: 1
  port: 50055
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  service:
    type: ClusterIP
    # -- NodePort (only used when type is NodePort)
    nodePort: ""
  # -- API key for authenticating requests (strongly recommended for production).
  # Prefer apiKeySecretName for production; apiKey is for dev convenience only.
  apiKey: ""
  # -- Name of a k8s Secret with key "api-key" containing the API key.
  # If set, takes precedence over apiKey.
  # Create with: kubectl -n aot create secret generic aot-apiserver-apikey --from-literal=api-key=<key>
  apiKeySecretName: ""
  # -- Comma-separated list of allowed CORS origins (e.g. "https://app.example.com")
  # Defaults to localhost:3000,localhost:5173 for development.
  # Set to "*" to allow all origins (not recommended for production).
  allowedOrigins: ""
  # -- Host path for local-path-provisioner PVC data.
  # When set, the apiserver mounts this directory (read-only) so it can read
  # logs, traces, and workspace files from completed runs whose pods are scaled
  # to 0. Set to the provisioner's data directory for your local cluster:
  #   k3s / k3d / Rancher Desktop: /var/lib/rancher/k3s/storage
  #   OrbStack / Docker Desktop:   /opt/local-path-provisioner
  #   kind:                        /var/local-path-provisioner
  # Leave empty to disable (logs/traces/files will only work for running runs).
  pvcDataHostPath: ""
  # -- Run the apiserver as root (UID 0) when pvcDataHostPath is set.
  # Required for k3s/colima where /var/lib/rancher/k3s/storage is mode 700.
  # Safe for local dev only — do not enable in production.
  pvcDataRunAsRoot: false
  # -- Per-IP rate limiting configuration.
  # NOTE: In-process only (single-replica). For multi-replica deployments, use an external
  # rate limiter (e.g. Redis-backed). Set enabled: true in production with conservative limits.
  rateLimit:
    # -- Enable rate limiting. Disabled by default; enable in production.
    enabled: false
    # -- Global requests per second per IP.
    rps: 100
    # -- Global burst allowance.
    burst: 20
    # -- LLM endpoints (classify, chat/stream) requests per second per IP.
    llmRps: 10
    # -- LLM endpoints burst allowance.
    llmBurst: 5
    # -- Webhook endpoint requests per second per IP.
    webhookRps: 5
    # -- Webhook endpoint burst allowance.
    webhookBurst: 2
    # -- Minutes after which an inactive IP entry is evicted from memory.
    ttlMinutes: 10
    # -- When true, reads client IP from X-Forwarded-For header (for ingress deployments).
    # Only enable when behind a trusted proxy/ingress controller.
    trustProxy: false

# -- BFF (Backend for Frontend) configuration
# When enabled, replaces the nginx web deployment with a Go BFF that
# serves the SPA and proxies API/ConnectRPC requests to the apiserver.
bff:
  # -- Enable the BFF. Start disabled; enable when ready to switch from nginx.
  enabled: false
  replicas: 1
  authMode: "open"
  service:
    type: NodePort
    nodePort: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Web Dashboard configuration
# TODO(7.4): The nginx web deployment will be removed once the BFF is
# production-ready and fully replaces it. Until then, both templates
# coexist and are toggled independently via web.enabled / bff.enabled.
web:
  # -- Enable the web dashboard
  enabled: true
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    # -- NodePort (only used when type is NodePort)
    nodePort: ""

# -- Cudgel semantic code search service
cudgel:
  # -- Enable the cudgel Deployment and Service
  enabled: false
  # -- Container image for the cudgel-shim (bundles Go shim + cudgel Rust binary)
  # TODO(helm): pin to a versioned tag; :latest bypasses image digest verification
  image: ghcr.io/uncworks/aot-cudgel-shim:latest
  # -- Cluster-internal endpoint used by workers and the hydration init-container.
  # Defaults to the in-cluster Service DNS name using the Release namespace.
  # Override only if cudgel is deployed outside this release's namespace.
  endpoint: ""
  resources:
    cpu: 250m
    memory: 256Mi

# -- soft-serve Git server for project config repos
softServe:
  enabled: true
  # TODO(helm): pin to a versioned tag; :latest bypasses image digest verification
  image: charmcli/soft-serve:latest
  storage: 2Gi
  storageClass: local-path
  adminKey: ""
  resources:
    cpu: 100m
    memory: 128Mi
