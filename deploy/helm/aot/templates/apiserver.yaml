apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aot.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  replicas: {{ .Values.apiserver.replicas }}
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: apiserver
  template:
    metadata:
      labels:
        {{- include "aot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: apiserver
    spec:
      serviceAccountName: {{ include "aot.fullname" . }}
      {{- if and .Values.apiserver.pvcDataHostPath .Values.apiserver.pvcDataRunAsRoot }}
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      {{- else }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      {{- end }}
      {{- if gt (int .Values.apiserver.replicas) 1 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "aot.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: apiserver
      {{- end }}
      containers:
        - name: apiserver
          image: {{ include "aot.controlplaneImage" . }}
          imagePullPolicy: {{ .Values.images.controlplane.pullPolicy }}
          command: ["/usr/local/bin/apiserver"]
          ports:
            - name: grpc
              containerPort: {{ .Values.apiserver.port }}
          env:
            - name: LISTEN_ADDR
              value: ":{{ .Values.apiserver.port }}"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            {{- end }}
            {{- if .Values.logFormat }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat | quote }}
            {{- end }}
            - name: TEMPORAL_HOST
              value: {{ .Values.temporal.host | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            {{- if .Values.apiserver.apiKeySecretName }}
            - name: AOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiserver.apiKeySecretName }}
                  key: api-key
            {{- else if .Values.apiserver.apiKey }}
            # TODO(helm): move apiserver.apiKey to a Secret reference (apiserver.apiKeySecretName) for production
            - name: AOT_API_KEY
              value: {{ .Values.apiserver.apiKey | quote }}
            {{- end }}
            {{- if .Values.apiserver.allowedOrigins }}
            - name: AOT_ALLOWED_ORIGINS
              value: {{ .Values.apiserver.allowedOrigins | quote }}
            {{- end }}
            {{- if .Values.llm.baseUrl }}
            - name: LITELLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.llm.masterKeySecretName }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.masterKeySecretName }}
                  key: LITELLM_MASTER_KEY
            {{- end }}
            {{- if .Values.github.tokenSecretName }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.tokenSecretName }}
                  key: token
            {{- end }}
            {{- if .Values.github.webhook.secretName }}
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.webhook.secretName }}
                  key: webhook-secret
            {{- else if .Values.github.webhook.secret }}
            - name: GITHUB_WEBHOOK_SECRET
              value: {{ .Values.github.webhook.secret | quote }}
            {{- end }}
            {{- if .Values.github.webhook.repos }}
            - name: GITHUB_WEBHOOK_REPOS
              value: {{ .Values.github.webhook.repos | quote }}
            {{- end }}
            {{- if .Values.github.webhook.ciAutofixMaxRetries }}
            - name: CI_AUTOFIX_MAX_RETRIES
              value: {{ .Values.github.webhook.ciAutofixMaxRetries | quote }}
            {{- end }}
            {{- if .Values.softServe.enabled }}
            - name: SOFT_SERVE_ADDR
              value: "soft-serve.{{ .Release.Namespace }}.svc:23231"
            - name: SOFT_SERVE_KEY_PATH
              value: "/etc/soft-serve/id_ed25519"
            {{- end }}
            {{- with .Values.apiserver.rateLimit }}
            - name: RATE_LIMIT_ENABLED
              value: {{ .enabled | quote }}
            - name: RATE_LIMIT_RPS
              value: {{ .rps | quote }}
            - name: RATE_LIMIT_BURST
              value: {{ .burst | quote }}
            - name: RATE_LIMIT_LLM_RPS
              value: {{ .llmRps | quote }}
            - name: RATE_LIMIT_LLM_BURST
              value: {{ .llmBurst | quote }}
            - name: RATE_LIMIT_WEBHOOK_RPS
              value: {{ .webhookRps | quote }}
            - name: RATE_LIMIT_WEBHOOK_BURST
              value: {{ .webhookBurst | quote }}
            - name: RATE_LIMIT_TTL_MINUTES
              value: {{ .ttlMinutes | quote }}
            - name: RATE_LIMIT_TRUST_PROXY
              value: {{ .trustProxy | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.apiserver.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.apiserver.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.apiserver.port }}
            failureThreshold: 30
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            {{- if and .Values.apiserver.pvcDataHostPath .Values.apiserver.pvcDataRunAsRoot }}
            runAsNonRoot: false
            runAsUser: 0
            {{- else }}
            runAsNonRoot: true
            runAsUser: 65534
            {{- end }}
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.softServe.enabled }}
            - name: soft-serve-key
              mountPath: /etc/soft-serve
              readOnly: true
            {{- end }}
            {{- if .Values.apiserver.pvcDataHostPath }}
            - name: pvc-data
              mountPath: {{ .Values.apiserver.pvcDataHostPath }}
              readOnly: true
            {{- end }}
          {{- with .Values.apiserver.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.softServe.enabled }}
        - name: soft-serve-key
          secret:
            secretName: soft-serve-admin-key
            defaultMode: 0444
        {{- end }}
        {{- if .Values.apiserver.pvcDataHostPath }}
        - name: pvc-data
          hostPath:
            path: {{ .Values.apiserver.pvcDataHostPath }}
            type: DirectoryOrCreate
        {{- end }}
---
# PodDisruptionBudget: ensures at least one apiserver replica is available during node drains.
# With replicas=1 (default) this prevents eviction — increase apiserver.replicas to >=2 in
# production for rolling-drain tolerance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aot.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: apiserver
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aot.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  type: {{ .Values.apiserver.service.type }}
  selector:
    {{- include "aot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
  ports:
    - name: grpc
      port: {{ .Values.apiserver.port }}
      targetPort: {{ .Values.apiserver.port }}
      {{- if and (eq .Values.apiserver.service.type "NodePort") .Values.apiserver.service.nodePort }}
      nodePort: {{ .Values.apiserver.service.nodePort }}
      {{- end }}
