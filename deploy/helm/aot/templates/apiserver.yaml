apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aot.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  replicas: {{ .Values.apiserver.replicas }}
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: apiserver
  template:
    metadata:
      labels:
        {{- include "aot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: apiserver
    spec:
      serviceAccountName: {{ include "aot.fullname" . }}
      containers:
        - name: apiserver
          image: {{ include "aot.controlplaneImage" . }}
          imagePullPolicy: {{ .Values.images.controlplane.pullPolicy }}
          command: ["/usr/local/bin/apiserver"]
          ports:
            - name: grpc
              containerPort: {{ .Values.apiserver.port }}
          env:
            - name: LISTEN_ADDR
              value: ":{{ .Values.apiserver.port }}"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: TEMPORAL_HOST
              value: {{ .Values.temporal.host | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            {{- if .Values.apiserver.apiKey }}
            - name: AOT_API_KEY
              value: {{ .Values.apiserver.apiKey | quote }}
            {{- end }}
            {{- if .Values.apiserver.allowedOrigins }}
            - name: AOT_ALLOWED_ORIGINS
              value: {{ .Values.apiserver.allowedOrigins | quote }}
            {{- end }}
            {{- if .Values.llm.baseUrl }}
            - name: LITELLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.github.tokenSecretName }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.tokenSecretName }}
                  key: token
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.apiserver.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.apiserver.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: pvc-data
              mountPath: /opt/local-path-provisioner
              readOnly: true
          {{- with .Values.apiserver.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: pvc-data
          hostPath:
            path: /opt/local-path-provisioner
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aot.fullname" . }}-apiserver
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
spec:
  type: {{ .Values.apiserver.service.type }}
  selector:
    {{- include "aot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: apiserver
  ports:
    - name: grpc
      port: {{ .Values.apiserver.port }}
      targetPort: {{ .Values.apiserver.port }}
