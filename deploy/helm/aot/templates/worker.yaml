apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aot.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "aot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "aot.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: worker
          image: {{ include "aot.controlplaneImage" . }}
          imagePullPolicy: {{ .Values.images.controlplane.pullPolicy }}
          command: ["/usr/local/bin/temporal-worker"]
          env:
            - name: TEMPORAL_HOST
              value: {{ .Values.temporal.host | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: AOT_AGENT_IMAGE
              value: "{{ .Values.images.agent.repository }}:{{ .Values.images.agent.tag | default .Chart.AppVersion }}"
            - name: AOT_SIDECAR_IMAGE
              value: "{{ .Values.images.sidecar.repository }}:{{ .Values.images.sidecar.tag | default .Chart.AppVersion }}"
            - name: AOT_INIT_IMAGE
              value: "{{ .Values.images.init.repository }}:{{ .Values.images.init.tag | default .Chart.AppVersion }}"
            {{- if .Values.llm.baseUrl }}
            - name: LITELLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.llm.masterKeySecretName }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.llm.masterKeySecretName }}
                  key: LITELLM_MASTER_KEY
            {{- else if .Values.llm.apiKey }}
            # TODO(helm): move llm.apiKey to a Secret reference (llm.masterKeySecretName) for production
            - name: LITELLM_MASTER_KEY
              value: {{ .Values.llm.apiKey | quote }}
            {{- end }}
            {{- if .Values.worker.brainDatabaseURL }}
            - name: BRAIN_DATABASE_URL
              value: {{ .Values.worker.brainDatabaseURL | quote }}
            {{- end }}
            {{- if .Values.worker.brainDBMaxConns }}
            - name: BRAIN_DB_MAX_CONNS
              value: {{ .Values.worker.brainDBMaxConns | quote }}
            {{- end }}
            {{- if .Values.worker.brainDBMinConns }}
            - name: BRAIN_DB_MIN_CONNS
              value: {{ .Values.worker.brainDBMinConns | quote }}
            {{- end }}
            {{- if .Values.worker.embedderBaseURL }}
            - name: EMBEDDER_BASE_URL
              value: {{ .Values.worker.embedderBaseURL | quote }}
            {{- end }}
            {{- if .Values.worker.embedderModel }}
            - name: EMBEDDER_MODEL
              value: {{ .Values.worker.embedderModel | quote }}
            {{- end }}
            {{- if .Values.github.tokenSecretName }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.tokenSecretName }}
                  key: token
            - name: GITHUB_TOKEN_SECRET_NAME
              value: {{ .Values.github.tokenSecretName | quote }}
            {{- end }}
            {{- if .Values.cudgel.enabled }}
            - name: CUDGEL_ENDPOINT
              value: {{ include "aot.cudgelEndpoint" . | quote }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: health
              containerPort: 8091
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /readyz
              port: health
            failureThreshold: 30
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
---
# PodDisruptionBudget: ensures at least one Temporal worker stays up during node drains.
# With replicas=1 (default) this prevents eviction — increase worker.replicas to >=2 in
# production for rolling-drain tolerance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "aot.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
