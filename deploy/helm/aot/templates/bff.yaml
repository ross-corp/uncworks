{{- if .Values.bff.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aot.fullname" . }}-bff
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: bff
  template:
    metadata:
      labels:
        {{- include "aot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: bff
    spec:
      serviceAccountName: {{ include "aot.fullname" . }}
      containers:
        - name: bff
          image: {{ include "aot.bffImage" . }}
          imagePullPolicy: {{ .Values.images.bff.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: APISERVER_URL
              value: "http://{{ include "aot.fullname" . }}-apiserver:{{ .Values.apiserver.port }}"
            - name: AUTH_MODE
              value: {{ .Values.bff.authMode | default "open" | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          {{- with .Values.bff.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aot.fullname" . }}-bff
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: bff
spec:
  type: {{ .Values.bff.service.type | default "NodePort" }}
  selector:
    {{- include "aot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: bff
  ports:
    - name: http
      port: 3000
      targetPort: http
      {{- if .Values.bff.service.nodePort }}
      nodePort: {{ .Values.bff.service.nodePort }}
      {{- end }}
{{- end }}
