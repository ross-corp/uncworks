{{- include "aot.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aot.fullname" . }}-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
spec:
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        {{- include "aot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: {{ include "aot.fullname" . }}
      containers:
        - name: controller
          image: {{ include "aot.controlplaneImage" . }}
          imagePullPolicy: {{ .Values.images.controlplane.pullPolicy }}
          command: ["/usr/local/bin/controller"]
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.logLevel }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            {{- end }}
            - name: TEMPORAL_HOST
              value: {{ .Values.temporal.host | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: METRICS_ADDR
              value: ":{{ .Values.controller.metricsPort }}"
            - name: AOT_RETENTION_DAYS
              value: {{ .Values.controller.retentionDays | quote }}
            {{- if .Values.llm.baseUrl }}
            - name: LITELLM_BASE_URL
              value: {{ .Values.llm.baseUrl | quote }}
            {{- end }}
            {{- if .Values.github.tokenSecretName }}
            - name: GITHUB_TOKEN_SECRET_NAME
              value: {{ .Values.github.tokenSecretName | quote }}
            {{- end }}
            {{- if .Values.cudgel.enabled }}
            - name: CUDGEL_ENDPOINT
              value: {{ include "aot.cudgelEndpoint" . | quote }}
            {{- end }}
            {{- if .Values.softServe.enabled }}
            - name: SOFT_SERVE_ADDR
              value: "soft-serve.{{ .Release.Namespace }}.svc:23231"
            - name: SOFT_SERVE_KEY_PATH
              value: "/etc/soft-serve/id_ed25519"
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.controller.metricsPort }}
            - name: health
              containerPort: 8091
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- if .Values.softServe.enabled }}
            - name: soft-serve-key
              mountPath: /etc/soft-serve
              readOnly: true
          {{- end }}
          {{- with .Values.controller.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- if .Values.softServe.enabled }}
        - name: soft-serve-key
          secret:
            secretName: soft-serve-admin-key
            # 0444: world-readable so the nonroot UID (65532) can read it.
            # The Go client copies it to a 0600 temp file before ssh uses it,
            # so ssh never sees the permissive mode.
            defaultMode: 0444
      {{- end }}
