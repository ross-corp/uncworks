apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
---
# ClusterRole: covers cluster-scoped resources and CRDs that the controller/worker
# must watch across namespaces. Core namespace-scoped resources (secrets, events,
# leases, PVCs, pods, deployments) are granted via the Role below to minimize
# cluster-wide read access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aot.fullname" . }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
rules:
  - apiGroups: ["aot.uncworks.io"]
    resources: ["agentruns"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["agentruns/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["agentruns/finalizers"]
    verbs: ["update"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["projects/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["projects/finalizers"]
    verbs: ["update"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["runtemplates", "chains", "chainruns", "schedules"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["chainruns/status", "schedules/status", "runtemplates/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["chainruns/finalizers", "schedules/finalizers"]
    verbs: ["update"]
  # PersistentVolumes are cluster-scoped; needed to resolve volume details for completed runs.
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aot.fullname" . }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aot.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aot.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Role: namespace-scoped permissions for pods, deployments, PVCs, secrets, events,
# and leader-election leases. Secrets access is intentionally limited to the release
# namespace — if agents ever need cross-namespace secrets, introduce a dedicated
# ServiceAccount with explicit per-namespace RoleBindings.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "aot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election lease management.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "aot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "aot.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aot.fullname" . }}
    namespace: {{ .Release.Namespace }}
