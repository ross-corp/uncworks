apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aot.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aot.fullname" . }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
rules:
  - apiGroups: ["aot.uncworks.io"]
    resources: ["agentruns"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["agentruns/status"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["agentruns/finalizers"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["projects"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["projects/status"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["projects/finalizers"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["runtemplates", "chains", "chainruns", "schedules"]
    verbs: ["*"]
  - apiGroups: ["aot.uncworks.io"]
    resources: ["chainruns/status", "schedules/status", "runtemplates/status"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aot.fullname" . }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aot.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "aot.fullname" . }}
    namespace: {{ .Release.Namespace }}
