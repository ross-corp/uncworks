{{- if .Values.cudgel.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aot.fullname" . }}-cudgel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: cudgel
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "aot.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: cudgel
  template:
    metadata:
      labels:
        {{- include "aot.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cudgel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: cudgel-shim
          image: {{ .Values.cudgel.image | default "ghcr.io/uncworks/aot-cudgel-shim:latest" }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CUDGEL_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cudgel-db-credentials
                  key: CUDGEL_DATABASE_URL
            - name: CUDGEL_SHIM_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: {{ .Values.cudgel.resources.cpu | default "250m" }}
              memory: {{ .Values.cudgel.resources.memory | default "256Mi" }}
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aot.fullname" . }}-cudgel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aot.labels" . | nindent 4 }}
    app.kubernetes.io/component: cudgel
spec:
  selector:
    {{- include "aot.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: cudgel
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
{{- end }}
