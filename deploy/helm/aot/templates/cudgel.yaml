{{- if .Values.cudgel.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cudgel
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cudgel
    app.kubernetes.io/part-of: aot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cudgel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cudgel
        app.kubernetes.io/part-of: aot
    spec:
      containers:
        - name: cudgel-shim
          image: {{ .Values.cudgel.image | default "ghcr.io/uncworks/aot-cudgel-shim:latest" }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CUDGEL_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cudgel-db-credentials
                  key: CUDGEL_DATABASE_URL
            - name: CUDGEL_SHIM_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: {{ .Values.cudgel.resources.cpu | default "250m" }}
              memory: {{ .Values.cudgel.resources.memory | default "256Mi" }}
            limits:
              cpu: "1000m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /search
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: cudgel
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cudgel
    app.kubernetes.io/part-of: aot
spec:
  selector:
    app.kubernetes.io/name: cudgel
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
{{- end }}
