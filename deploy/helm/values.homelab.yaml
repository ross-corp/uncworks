# values.homelab.yaml — Helm values for the homelab k0s cluster (vorgossos).
# Images are imported directly into containerd via ctr; pullPolicy: Never ensures
# k8s does not attempt to pull from a registry.
#
# Usage:
#   helm upgrade --install uncworks ./deploy/helm/aot \
#     -n uncworks --create-namespace \
#     -f deploy/helm/values.homelab.yaml \
#     --set temporal.host=temporal-dev.uncworks.svc.cluster.local:7233

# Temporal — in-cluster dev server deployed as temporal-dev deployment
temporal:
  host: "temporal-dev.uncworks.svc.cluster.local:7233"
  namespace: "default"

# LiteLLM proxy deployed in-cluster
llm:
  baseUrl: "http://litellm.uncworks.svc.cluster.local:4000"
  masterKeySecretName: "litellm-master-key"

# GitHub token for cloning private repos
github:
  tokenSecretName: "github-token"

# All images built locally and imported into k0s containerd (amd64)
images:
  controlplane:
    repository: docker.io/library/aot-controlplane
    tag: homelab
    pullPolicy: Never
  init:
    repository: docker.io/library/aot-init
    tag: homelab
    pullPolicy: Never
  sidecar:
    repository: docker.io/library/aot-sidecar
    tag: homelab
    pullPolicy: Never
  agent:
    repository: docker.io/library/aot-agent
    tag: homelab
    pullPolicy: Never
  web:
    repository: docker.io/library/aot-web
    tag: homelab
    pullPolicy: Never
  bff:
    repository: docker.io/library/aot-bff
    tag: homelab
    pullPolicy: Never

# Controller configuration
controller:
  replicas: 1
  retentionDays: 7
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

# Worker configuration
worker:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

# API server — use NodePort for direct access from host
apiserver:
  replicas: 1
  port: 50055
  service:
    type: NodePort
    nodePort: 30055
  # k0s uses local-path-provisioner at /opt/local-path-provisioner by default
  pvcDataHostPath: "/opt/local-path-provisioner"
  pvcDataRunAsRoot: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Web dashboard — NodePort for direct access
web:
  enabled: true
  replicas: 1
  port: 3000
  service:
    type: NodePort
    nodePort: 30300
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

# BFF is disabled — using nginx web deployment
bff:
  enabled: false

# soft-serve git server — use local-path storage class
softServe:
  enabled: false

# Logging
logLevel: "info"
