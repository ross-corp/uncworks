# LiteLLM Proxy configuration for AOT.
# Reference: https://docs.litellm.ai/docs/proxy/configs
#
# Model names map directly to what the UI shows.
# Users select by model name, not by abstract "tier".

model_list:
  # --- Local models (Ollama) ---
  - model_name: "qwen3:8b"
    litellm_params:
      model: "ollama_chat/qwen3:8b"
      api_base: "http://ollama:11434"

  - model_name: "llama3.1:8b"
    litellm_params:
      model: "ollama_chat/llama3.1:8b"
      api_base: "http://ollama:11434"

  - model_name: "qwen2.5:0.5b"
    litellm_params:
      model: "ollama_chat/qwen2.5:0.5b"
      api_base: "http://ollama:11434"

  # Default: best local model (no rate limits, fast, no API key needed)
  - model_name: "default"
    litellm_params:
      model: "ollama_chat/qwen3:8b"
      api_base: "http://ollama:11434"

  # Default-cloud: cheapest effective paid model
  # DeepSeek V3.1 — $0.15/M in, $0.75/M out, strong coding/reasoning
  - model_name: "default-cloud"
    litellm_params:
      model: "openrouter/deepseek/deepseek-chat-v3.1"

  # CI: tiny local model for testing only
  - model_name: "ci"
    litellm_params:
      model: "ollama_chat/qwen2.5:0.5b"
      api_base: "http://ollama:11434"

  # --- Cloud models (OpenRouter, paid tier) ---

  # Qwen3 Coder — $0.22/M in, $1.00/M out, 262K ctx
  # Purpose-built for agentic coding, tool use, long-context repo reasoning
  - model_name: "qwen3-coder"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder"

  # DeepSeek V3.1 — $0.15/M in, $0.75/M out, 32K ctx
  # Cheapest paid model, strong at coding/reasoning
  - model_name: "deepseek-v3.1"
    litellm_params:
      model: "openrouter/deepseek/deepseek-chat-v3.1"

  # DeepSeek V3.2 — $0.26/M in, $0.38/M out, 164K ctx
  # Cheapest output tokens, great for code generation
  - model_name: "deepseek-v3.2"
    litellm_params:
      model: "openrouter/deepseek/deepseek-v3.2"

  # Mistral Medium 3.1 — $0.40/M in, $2.00/M out, 131K ctx
  # Strong coding + multimodal support
  - model_name: "mistral-medium"
    litellm_params:
      model: "openrouter/mistralai/mistral-medium-3.1"

  # Claude Sonnet 4 — $3.00/M in, $15.00/M out, 200K ctx
  # Best coding model available, use for complex tasks
  - model_name: "claude-sonnet-4"
    litellm_params:
      model: "openrouter/anthropic/claude-sonnet-4"

  # Claude Haiku 3.5 — $0.80/M in, $4.00/M out, 200K ctx
  # Fast Anthropic model for lighter tasks
  - model_name: "claude-haiku"
    litellm_params:
      model: "openrouter/anthropic/claude-3.5-haiku"

  # GPT-4.1 Mini — $0.40/M in, $1.60/M out, 1M ctx
  # Good balance, huge context window
  - model_name: "gpt-4.1-mini"
    litellm_params:
      model: "openrouter/openai/gpt-4.1-mini"

  # Gemini 2.5 Flash — $0.15/M in, $0.60/M out, 1M ctx
  # Very cheap, massive context, fast
  - model_name: "gemini-flash"
    litellm_params:
      model: "openrouter/google/gemini-2.5-flash-preview"

  # Qwen3 235B A22B — $0.20/M in, $1.20/M out, 131K ctx
  # Largest Qwen3 MoE, strong reasoning
  - model_name: "qwen3-235b"
    litellm_params:
      model: "openrouter/qwen/qwen3-235b-a22b"

  # Gemini 3 Flash Preview — newest Google model
  - model_name: "gemini-3-flash"
    litellm_params:
      model: "openrouter/google/gemini-3-flash-preview"

  # Claude Sonnet 4.6 — latest Anthropic
  - model_name: "claude-sonnet-4.6"
    litellm_params:
      model: "openrouter/anthropic/claude-sonnet-4-6-20260320"

  # Grok 4.1 Fast
  - model_name: "grok-4.1-fast"
    litellm_params:
      model: "openrouter/x-ai/grok-4.1-fast"

  # Kimi K2.5 by Moonshot
  - model_name: "kimi-k2.5"
    litellm_params:
      model: "openrouter/moonshotai/kimi-k2.5"

  # MiniMax M2.5
  - model_name: "minimax-m2.5"
    litellm_params:
      model: "openrouter/minimax/minimax-m2.5"

  # --- Free tier (rate-limited, fallback only) ---
  - model_name: "nemotron-3-super-free"
    litellm_params:
      model: "openrouter/nvidia/nemotron-3-super-120b-a12b:free"

  - model_name: "step-flash-free"
    litellm_params:
      model: "openrouter/stepfun/step-3.5-flash:free"

  - model_name: "trinity-free"
    litellm_params:
      model: "openrouter/arcee-ai/trinity-large-preview:free"

  - model_name: "qwen3-coder-free"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"

  - model_name: "mistral-small-free"
    litellm_params:
      model: "openrouter/mistralai/mistral-small-3.1-24b-instruct:free"

  # Aliases
  - model_name: "premium"
    litellm_params:
      model: "openrouter/anthropic/claude-sonnet-4"

general_settings:
  master_key: sk-uncworks-local
  # Disable spend/error logging to avoid "No connected db." errors when no
  # database is configured. LiteLLM main-latest attempts DB writes for
  # telemetry even with master_key auth, causing 400s on every LLM call.
  disable_spend_logs: true
  disable_error_logs: true
  store_model_in_db: false

litellm_settings:
  # Fallback chains: paid → paid → local
  fallbacks:
    - {"qwen3-coder": ["deepseek-v3.2", "deepseek-v3.1", "qwen3:8b"]}
    - {"deepseek-v3.2": ["qwen3-coder", "deepseek-v3.1", "qwen3:8b"]}
    - {"deepseek-v3.1": ["qwen3-coder", "deepseek-v3.2", "qwen3:8b"]}
    - {"default-cloud": ["deepseek-v3.2", "qwen3:8b"]}

  # Retry settings
  num_retries: 3
  retry_after: 5  # seconds between retries

  drop_params: true
  max_parallel_requests: 10
