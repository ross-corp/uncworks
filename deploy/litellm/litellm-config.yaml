# LiteLLM Proxy configuration for AOT.
# Reference: https://docs.litellm.ai/docs/proxy/configs
#
# Model names map directly to what the UI shows.
# Users select by model name, not by abstract "tier".

model_list:
  # --- Local models (Ollama) ---
  - model_name: "qwen3:8b"
    litellm_params:
      model: "ollama_chat/qwen3:8b"
      api_base: "http://ollama:11434"

  - model_name: "llama3.1:8b"
    litellm_params:
      model: "ollama_chat/llama3.1:8b"
      api_base: "http://ollama:11434"

  - model_name: "qwen2.5:0.5b"
    litellm_params:
      model: "ollama_chat/qwen2.5:0.5b"
      api_base: "http://ollama:11434"

  # Default: best local model (no rate limits, fast, no API key needed)
  - model_name: "default"
    litellm_params:
      model: "ollama_chat/qwen3:8b"
      api_base: "http://ollama:11434"

  # Default-cloud: capable cloud model (rate-limited on free tier)
  - model_name: "default-cloud"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"

  # CI: tiny local model for testing only
  - model_name: "ci"
    litellm_params:
      model: "ollama_chat/qwen2.5:0.5b"
      api_base: "http://ollama:11434"

  # --- Cloud models (OpenRouter) ---
  - model_name: "qwen3-coder"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"

  - model_name: "mistral-small"
    litellm_params:
      model: "openrouter/mistralai/mistral-small-3.1-24b-instruct:free"

  - model_name: "gemma-3-4b"
    litellm_params:
      model: "openrouter/google/gemma-3-4b-it:free"

  # Aliases
  - model_name: "premium"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"

litellm_settings:
  # Fallback: if primary model is rate-limited, try alternatives
  fallbacks:
    - {"qwen3-coder": ["mistral-small", "gemma-3-4b", "qwen3:8b"]}
    - {"mistral-small": ["qwen3-coder", "gemma-3-4b", "qwen3:8b"]}
    - {"default-cloud": ["qwen3:8b", "llama3.1:8b"]}

  # Retry settings
  num_retries: 3
  retry_after: 5  # seconds between retries

  drop_params: true
  max_parallel_requests: 10
