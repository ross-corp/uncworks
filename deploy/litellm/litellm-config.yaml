# LiteLLM Proxy configuration for AOT.
# Reference: https://docs.litellm.ai/docs/proxy/configs
#
# Model names map directly to what the UI shows.
# Users select by model name, not by abstract "tier".

model_list:
  # --- Local models (Ollama) ---
  - model_name: "qwen2.5:0.5b"
    litellm_params:
      model: "ollama_chat/qwen2.5:0.5b"
      api_base: "http://ollama:11434"

  # Default routes to a capable cloud model for production use.
  # Use "ci" explicitly for the local 0.5b model in CI/testing.
  - model_name: "default"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"
  - model_name: "ci"
    litellm_params:
      model: "ollama_chat/qwen2.5:0.5b"
      api_base: "http://ollama:11434"

  # --- Cloud models (OpenRouter) ---
  - model_name: "qwen3-coder"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"

  - model_name: "mistral-small"
    litellm_params:
      model: "openrouter/mistralai/mistral-small-3.1-24b-instruct:free"

  - model_name: "gemma-3-4b"
    litellm_params:
      model: "openrouter/google/gemma-3-4b-it:free"

  # Aliases for backward compat
  - model_name: "default-cloud"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"
  - model_name: "premium"
    litellm_params:
      model: "openrouter/qwen/qwen3-coder:free"

litellm_settings:
  # Fallback: if primary model is rate-limited, try alternatives
  fallbacks:
    - {"qwen3-coder": ["mistral-small", "gemma-3-4b", "default"]}
    - {"mistral-small": ["qwen3-coder", "gemma-3-4b", "default"]}
    - {"gemma-3-4b": ["qwen3-coder", "mistral-small", "default"]}

  # Retry settings
  num_retries: 3
  retry_after: 5  # seconds between retries

  drop_params: true
  max_parallel_requests: 10
