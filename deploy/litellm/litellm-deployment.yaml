apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: aot
data:
  config.yaml: |
    model_list:
      # Ollama local models
      - model_name: "default"
        litellm_params:
          model: "ollama_chat/qwen2.5:0.5b"
          api_base: "http://ollama.aot.svc.cluster.local:11434"
      - model_name: "ci"
        litellm_params:
          model: "ollama_chat/qwen2.5:0.5b"
          api_base: "http://ollama.aot.svc.cluster.local:11434"
      # OpenRouter (set OPENROUTER_API_KEY env var)
      - model_name: "default-cloud"
        litellm_params:
          model: "openrouter/meta-llama/llama-3.1-8b-instruct:free"
    litellm_settings:
      drop_params: true
      max_parallel_requests: 10
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-master-key
  namespace: aot
type: Opaque
stringData:
  LITELLM_MASTER_KEY: "sk-aot-local-dev-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: aot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          ports:
            - containerPort: 4000
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: LITELLM_MASTER_KEY
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: aot
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-ui
  namespace: aot
spec:
  type: NodePort
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000
      nodePort: 30400
