apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agentruns.aot.uncworks.io
spec:
  group: aot.uncworks.io
  names:
    kind: AgentRun
    listKind: AgentRunList
    plural: agentruns
    singular: agentrun
    shortNames:
      - ar
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Backend
          type: string
          jsonPath: .spec.backend
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - backend
                - repos
                - prompt
              properties:
                backend:
                  type: string
                  enum:
                    - Pod
                  default: Pod
                repos:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - url
                    properties:
                      url:
                        type: string
                        maxLength: 2048
                      branch:
                        type: string
                        maxLength: 256
                      path:
                        type: string
                        maxLength: 512
                prompt:
                  type: string
                  maxLength: 100000
                displayName:
                  type: string
                  maxLength: 63
                autoPush:
                  type: boolean
                autoPR:
                  type: boolean
                prBaseBranch:
                  type: string
                  maxLength: 63
                maxBudget:
                  type: number
                project:
                  type: string
                  maxLength: 63
                feature:
                  type: string
                  maxLength: 63
                tags:
                  type: array
                  items:
                    type: string
                devboxConfig:
                  type: string
                  maxLength: 512
                ttlSeconds:
                  type: integer
                  format: int32
                  default: 3600
                  minimum: 60
                  maximum: 604800
                image:
                  type: string
                  maxLength: 512
                envVars:
                  type: object
                  additionalProperties:
                    type: string
                modelTier:
                  type: string
                  default: default
                  maxLength: 64
                manageModelTier:
                  type: string
                  maxLength: 64
                implementModelTier:
                  type: string
                  maxLength: 64
                parentRunID:
                  type: string
                  maxLength: 63
                orchestrationMode:
                  type: string
                  enum:
                    - single
                    - auto
                    - manual
                    - spec-driven
                  default: single
                orchestration:
                  type: object
                  properties:
                    tasks:
                      type: array
                      maxItems: 7
                      items:
                        type: object
                        required:
                          - name
                          - prompt
                        properties:
                          name:
                            type: string
                            pattern: "^[a-z0-9-]+$"
                          prompt:
                            type: string
                          repoUrls:
                            type: array
                            items:
                              type: string
                specRunID:
                  type: string
                  maxLength: 63
                specContent:
                  type: string
                  maxLength: 500000
                specSource:
                  type: string
                  maxLength: 512
                workspaceName:
                  type: string
                  maxLength: 128
                pipelineConfig:
                  type: object
                  properties:
                    plan:
                      type: object
                      properties:
                        model:
                          type: string
                        timeoutSeconds:
                          type: integer
                          format: int32
                        maxRetries:
                          type: integer
                          format: int32
                        onFailure:
                          type: string
                          enum: ["retry", "fail", "skip"]
                    execute:
                      type: object
                      properties:
                        model:
                          type: string
                        timeoutSeconds:
                          type: integer
                          format: int32
                        maxRetries:
                          type: integer
                          format: int32
                        onFailure:
                          type: string
                          enum: ["retry", "fail", "skip"]
                    verify:
                      type: object
                      properties:
                        model:
                          type: string
                        timeoutSeconds:
                          type: integer
                          format: int32
                        maxRetries:
                          type: integer
                          format: int32
                        onFailure:
                          type: string
                          enum: ["retry", "fail", "skip"]
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - WaitingForInput
                    - Succeeded
                    - Failed
                    - Cancelled
                message:
                  type: string
                podName:
                  type: string
                traceID:
                  type: string
                worktreePath:
                  type: string
                startedAt:
                  type: string
                  format: date-time
                completedAt:
                  type: string
                  format: date-time
                logOutput:
                  type: string
                  maxLength: 1048576
                retainUntil:
                  type: string
                  format: date-time
                deploymentName:
                  type: string
                debugActive:
                  type: boolean
                stage:
                  type: string
                  enum:
                    - planning
                    - executing
                    - verifying
                    - ""
                archived:
                  type: boolean
                prUrl:
                  type: string
                totalCost:
                  type: string
                totalAdditions:
                  type: integer
                  format: int32
                totalDeletions:
                  type: integer
                  format: int32
                retryCount:
                  type: integer
                  format: int32
                verificationResult:
                  type: string
                  maxLength: 1048576
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
