// agent.proto — Control Plane <-> Agent Sidecar (RPC Gateway) gRPC API
syntax = "proto3";

package aot.agent.v1;

option go_package = "github.com/uncworks/aot/gen/go/agent/v1;agentv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// AgentSidecarService runs in the RPC Gateway sidecar inside each Agent Pod.
// The Control Plane calls these RPCs to communicate with the agent harness.
service AgentSidecarService {
  // StartAgent initializes the agent harness with a prompt and config.
  rpc StartAgent(StartAgentRequest) returns (StartAgentResponse);

  // StreamOutput streams stdout/stderr from the agent harness to the Control Plane.
  rpc StreamOutput(StreamOutputRequest) returns (stream AgentOutput);

  // SendInput writes to the agent harness's stdin (e.g., human-in-the-loop input).
  rpc SendInput(SendInputRequest) returns (SendInputResponse);

  // GetStatus returns the current status of the agent process.
  rpc GetStatus(GetStatusRequest) returns (AgentStatus);

  // StopAgent gracefully terminates the agent harness.
  rpc StopAgent(StopAgentRequest) returns (StopAgentResponse);

  // ExecCommand runs a bash command in the workspace and returns the result.
  // Lightweight alternative to StartAgent for running CLI tools (openspec, test suites, etc.).
  rpc ExecCommand(ExecCommandRequest) returns (ExecCommandResponse);

  // SemanticSearch performs a semantic code search via the cudgel service.
  // Returns ranked code symbols matching the query.
  // Returns an empty response (no error) when CUDGEL_ENDPOINT is unset or cudgel is unavailable.
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);
}

// AgentNotificationService is called BY the sidecar back TO the Control Plane for async events.
service AgentNotificationService {
  // NotifyEvent sends an event from the sidecar to the Control Plane.
  rpc NotifyEvent(NotifyEventRequest) returns (NotifyEventResponse);
}

message StartAgentRequest {
  string agent_run_id = 1 [(buf.validate.field).string.min_len = 1];
  string prompt = 2 [(buf.validate.field).string.min_len = 1];
  string repo_path = 3;
  map<string, string> env_vars = 4;
  // Stage controls the agent's behavior in spec-driven pipelines.
  // Values: "" (default/single), "plan", "execute", "verify".
  string stage = 5;
  // ParentSpanID links this agent invocation to a parent stage span in the trace hierarchy.
  string parent_span_id = 7;
  // TraceID is the shared trace identifier across all spans in a pipeline run.
  string trace_id = 8;
}

message StartAgentResponse {
  bool started = 1;
  string error = 2;
}

message StreamOutputRequest {
  string agent_run_id = 1;
}

message AgentOutput {
  OutputType type = 1;
  bytes data = 2;
  google.protobuf.Timestamp timestamp = 3;
}

enum OutputType {
  OUTPUT_TYPE_UNSPECIFIED = 0;
  OUTPUT_TYPE_STDOUT = 1;
  OUTPUT_TYPE_STDERR = 2;
  OUTPUT_TYPE_TOOL_CALL = 3;
  OUTPUT_TYPE_LLM_RESPONSE = 4;
}

message SendInputRequest {
  string agent_run_id = 1;
  bytes data = 2;
}

message SendInputResponse {
  bool accepted = 1;
}

message GetStatusRequest {
  string agent_run_id = 1;
}

message AgentStatus {
  AgentProcessState state = 1;
  int32 pid = 2;
  string error = 3;
  google.protobuf.Timestamp started_at = 4;
}

enum AgentProcessState {
  AGENT_PROCESS_STATE_UNSPECIFIED = 0;
  AGENT_PROCESS_STATE_STARTING = 1;
  AGENT_PROCESS_STATE_RUNNING = 2;
  AGENT_PROCESS_STATE_WAITING_FOR_INPUT = 3;
  AGENT_PROCESS_STATE_COMPLETED = 4;
  AGENT_PROCESS_STATE_FAILED = 5;
}

message StopAgentRequest {
  string agent_run_id = 1;
  bool force = 2;
}

message StopAgentResponse {
  bool stopped = 1;
}

message NotifyEventRequest {
  string agent_run_id = 1;
  EventType event_type = 2;
  string payload = 3;
  google.protobuf.Timestamp timestamp = 4;
}

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_STARTED = 1;
  EVENT_TYPE_TOOL_CALL = 2;
  EVENT_TYPE_WAITING_FOR_INPUT = 3;
  EVENT_TYPE_COMPLETED = 4;
  EVENT_TYPE_FAILED = 5;
  EVENT_TYPE_LOG = 6;
}

message NotifyEventResponse {
  bool acknowledged = 1;
}

// ExecCommandRequest runs a bash command in the workspace.
message ExecCommandRequest {
  string command = 1 [(buf.validate.field).string.min_len = 1];
  string working_dir = 2;
  int32 timeout_seconds = 3;
}

// ExecCommandResponse contains the command execution result.
message ExecCommandResponse {
  string stdout = 1;
  string stderr = 2;
  int32 exit_code = 3;
}

// SemanticSearchRequest is sent by an agent to search for relevant code symbols.
message SemanticSearchRequest {
  // Natural language query string.
  string query = 1;
  // Maximum results to return. Defaults to 10 if unset; clamped to 50.
  int32 limit = 2;
}

// SemanticSearchResponse contains the ranked code symbol results.
message SemanticSearchResponse {
  repeated CodeChunk chunks = 1;
}

// CodeChunk represents a single code symbol result from cudgel.
message CodeChunk {
  string name    = 1;
  string kind    = 2;
  string file    = 3;
  int32  line    = 4;
  string snippet = 5;
  float  score   = 6;
}
