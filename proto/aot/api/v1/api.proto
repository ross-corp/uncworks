// api.proto — Client <-> Control Plane gRPC API
syntax = "proto3";

package aot.api.v1;

option go_package = "github.com/uncworks/aot/gen/go/api/v1;apiv1";

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

// AOTService is the main API for clients (Web UI, CLI) to interact with the Control Plane.
service AOTService {
  // CreateAgentRun submits a new agent run request.
  rpc CreateAgentRun(CreateAgentRunRequest) returns (CreateAgentRunResponse);

  // GetAgentRun retrieves the current state of an agent run.
  rpc GetAgentRun(GetAgentRunRequest) returns (AgentRun);

  // ListAgentRuns lists agent runs with optional filters.
  rpc ListAgentRuns(ListAgentRunsRequest) returns (ListAgentRunsResponse);

  // WatchAgentRun streams real-time updates for an agent run.
  rpc WatchAgentRun(WatchAgentRunRequest) returns (stream AgentRunEvent);

  // CancelAgentRun requests cancellation of a running agent.
  rpc CancelAgentRun(CancelAgentRunRequest) returns (CancelAgentRunResponse);

  // SendHumanInput provides human-in-the-loop input to a paused agent.
  rpc SendHumanInput(SendHumanInputRequest) returns (SendHumanInputResponse);

  // GetRunGraph returns the tree of runs for a spec execution.
  rpc GetRunGraph(GetRunGraphRequest) returns (RunGraph);

  // SearchPastWork searches the knowledge base for relevant past work using natural language.
  rpc SearchPastWork(SearchPastWorkRequest) returns (SearchPastWorkResponse);
}

// OrchestrationMode specifies how an agent run handles decomposition.
enum OrchestrationMode {
  ORCHESTRATION_MODE_UNSPECIFIED = 0;
  ORCHESTRATION_MODE_SINGLE = 1;
  ORCHESTRATION_MODE_AUTO = 2;
  ORCHESTRATION_MODE_MANUAL = 3;
  ORCHESTRATION_MODE_SPEC_DRIVEN = 4;
}

// Backend specifies the execution backend for an agent run.
enum Backend {
  BACKEND_UNSPECIFIED = 0;
  BACKEND_POD = 1;
}

// AgentRunPhase represents the lifecycle phase of an agent run.
enum AgentRunPhase {
  AGENT_RUN_PHASE_UNSPECIFIED = 0;
  AGENT_RUN_PHASE_PENDING = 1;
  AGENT_RUN_PHASE_RUNNING = 2;
  AGENT_RUN_PHASE_WAITING_FOR_INPUT = 3;
  AGENT_RUN_PHASE_SUCCEEDED = 4;
  AGENT_RUN_PHASE_FAILED = 5;
  AGENT_RUN_PHASE_CANCELLED = 6;
}

message AgentRun {
  string id = 1;
  string name = 2;
  AgentRunSpec spec = 3;
  AgentRunStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  // Children contains the names of junior AgentRuns spawned by this run.
  repeated string children = 7;
}

// Repository specifies a git repository to clone into the agent workspace.
message Repository {
  string url = 1 [(buf.validate.field).string.uri = true];
  string branch = 2;
  // Directory name under /workspace/<repo>/. Derived from repo URL if empty.
  string path = 3;
}

message AgentRunSpec {
  Backend backend = 1 [(buf.validate.field).enum = {not_in: [0]}];
  repeated Repository repos = 2 [(buf.validate.field).repeated.min_items = 1];
  string prompt = 4;
  string devbox_config = 5;
  int32 ttl_seconds = 6 [(buf.validate.field).int32.gte = 0];
  map<string, string> env_vars = 7;
  // Model tier for LLM routing: "default", "default-cloud", or "premium".
  string model_tier = 8;
  // Image overrides the default agent container image.
  string image = 9;
  // MaxBudget is the maximum LLM spend budget in USD.
  double max_budget = 10;
  // SpecContent is the CodeSpeak .cs.md spec body (markdown).
  string spec_content = 11;
  // SpecSource tracks where the spec came from: "editor", "github:<owner/repo/path>", "webhook:github:<owner/repo/path>".
  string spec_source = 12;
  // WorkspaceName is the name of the workspace preset used for this run.
  string workspace_name = 13;
  // Field 14 is reserved (was retain_pod_minutes, removed in persistent-workspace-architecture).
  reserved 14;
  // ParentRunID links this junior run to its parent senior run.
  string parent_run_id = 15;
  // OrchestrationMode controls decomposition behavior: single, auto, or manual.
  OrchestrationMode orchestration_mode = 16;
  // Orchestration defines the manual orchestration task list.
  Orchestration orchestration = 17;
  // SpecRunID groups all runs from a single spec execution.
  string spec_run_id = 18;
  // DisplayName is a human-readable name generated from the prompt by the LLM.
  string display_name = 19;
  // PipelineConfig provides per-stage configuration for spec-driven runs.
  PipelineConfig pipeline_config = 20;
  // AutoPush controls whether changes are pushed to a feature branch after successful verification.
  bool auto_push = 21;
  // AutoPR controls whether a GitHub PR is created after pushing changes.
  bool auto_pr = 22;
  // PRBaseBranch is the base branch for the PR (default: "main").
  string pr_base_branch = 23;
  // Project is the project this run belongs to.
  string project = 27;
  // Feature is the feature/unit-of-work this run contributes to.
  string feature = 28;
  // Tags are freeform labels for cross-cutting filtering.
  repeated string tags = 29;
  // ProjectRef is the name of the Project CRD this run belongs to.
  // When set, the controller resolves repos, model, and TTL defaults from the project.
  string project_ref = 30;
  // SpecRef is the name of a spec in the project's config repo (e.g., "add-comments").
  // Requires project_ref to be set. The controller fetches spec content from soft-serve.
  string spec_ref = 31;
  // ApprovalMode controls what approval is required before a run is marked Succeeded.
  // Values: "" (none), "hitl", "llm-judge", "hybrid".
  string approval_mode = 32;
}

// PipelineConfig provides per-stage configuration for the spec-driven pipeline.
message PipelineConfig {
  StageConfig plan = 1;
  StageConfig execute = 2;
  StageConfig verify = 3;
}

// StageConfig configures a single pipeline stage.
message StageConfig {
  string model = 1;
  int32 timeout_seconds = 2;
  int32 max_retries = 3;
  string on_failure = 4;
}

// OrchestrationTask defines a single sub-task in a manual orchestration.
message OrchestrationTask {
  string name = 1;
  string prompt = 2;
  repeated string repo_urls = 3;
}

// Orchestration contains the task list for manual orchestration mode.
message Orchestration {
  repeated OrchestrationTask tasks = 1;
}

message AgentRunStatus {
  AgentRunPhase phase = 1;
  string message = 2;
  string pod_name = 3;
  string trace_id = 4;
  google.protobuf.Timestamp started_at = 5;
  google.protobuf.Timestamp completed_at = 6;
  // WorktreePath is the path to the git worktree on the agent.
  string worktree_path = 7;
  // LogOutput is the persisted agent log output (up to 1MB), collected before pod deletion.
  string log_output = 8;
  // RetainUntil is when the pod retention expires and cleanup will run.
  google.protobuf.Timestamp retain_until = 9;
  // DeploymentName is the name of the Deployment managing the agent pod.
  string deployment_name = 10;
  // DebugActive indicates whether a debug session is currently active.
  bool debug_active = 11;
  // Stage is the current pipeline stage for spec-driven runs.
  string stage = 12;
  // RetryCount is the number of execute→verify retry attempts.
  int32 retry_count = 13;
  // VerificationResult is the JSON-encoded verdict from the verification stage.
  string verification_result = 14;
  // PRUrl is the URL of the GitHub PR created by the pipeline.
  string pr_url = 15;
  // TotalCost is the estimated spend for this run (e.g., "$0.12").
  string total_cost = 16;
  // TotalAdditions is the aggregate number of lines added across all commits.
  int32 total_additions = 17;
  // TotalDeletions is the aggregate number of lines deleted across all commits.
  int32 total_deletions = 18;
}

message CreateAgentRunRequest {
  AgentRunSpec spec = 1;
}

message CreateAgentRunResponse {
  AgentRun agent_run = 1;
}

message GetAgentRunRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message ListAgentRunsRequest {
  AgentRunPhase phase_filter = 1;
  int32 limit = 2;
  string cursor = 3;
  // SpecRunID filters runs belonging to a specific spec execution.
  string spec_run_id = 4;
  // ParentRunID filters runs that are children of a specific parent.
  string parent_run_id = 5;
  // StageFilter filters by pipeline stage (planning, executing, verifying).
  string stage_filter = 6;
  // ProjectFilter filters runs belonging to a specific project.
  string project_filter = 7;
  // FeatureFilter filters runs belonging to a specific feature.
  string feature_filter = 8;
  // TagFilter filters runs that have this tag.
  string tag_filter = 9;
}

message ListAgentRunsResponse {
  repeated AgentRun agent_runs = 1;
  string next_cursor = 2;
}

message WatchAgentRunRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message AgentRunEvent {
  string agent_run_id = 1;
  AgentRunEventType type = 2;
  string payload = 3;
  google.protobuf.Timestamp timestamp = 4;
}

enum AgentRunEventType {
  AGENT_RUN_EVENT_TYPE_UNSPECIFIED = 0;
  AGENT_RUN_EVENT_TYPE_PHASE_CHANGED = 1;
  AGENT_RUN_EVENT_TYPE_LOG = 2;
  AGENT_RUN_EVENT_TYPE_TOOL_CALL = 3;
  AGENT_RUN_EVENT_TYPE_WAITING_FOR_INPUT = 4;
  AGENT_RUN_EVENT_TYPE_COMPLETED = 5;
}

message CancelAgentRunRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message CancelAgentRunResponse {
  AgentRun agent_run = 1;
}

message SendHumanInputRequest {
  string agent_run_id = 1 [(buf.validate.field).string.min_len = 1];
  string input = 2 [(buf.validate.field).string.min_len = 1];
}

message SendHumanInputResponse {
  bool accepted = 1;
}

message GetRunGraphRequest {
  string id = 1 [(buf.validate.field).string.min_len = 1];
}

message RunGraphNode {
  string name = 1;
  AgentRunPhase phase = 2;
  string role = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp completed_at = 5;
}

message RunGraphEdge {
  string parent = 1;
  string child = 2;
}

message RunGraph {
  repeated RunGraphNode nodes = 1;
  repeated RunGraphEdge edges = 2;
}

// SourceFilter controls which knowledge base indexes are searched.
enum SourceFilter {
  SOURCE_FILTER_ALL = 0;
  SOURCE_FILTER_CODE = 1;
  SOURCE_FILTER_TRACE = 2;
  // SOURCE_FILTER_SOURCE_CODE queries the cudgel semantic code search index
  // rather than the internal code_chunks table.
  SOURCE_FILTER_SOURCE_CODE = 3;
}

message SearchPastWorkRequest {
  // Natural language query string.
  string query = 1;
  // Optional: filter results to a specific repository.
  string repo_url = 2;
  // Optional: filter results created after this timestamp.
  google.protobuf.Timestamp created_after = 3;
  // Optional: filter results created before this timestamp.
  google.protobuf.Timestamp created_before = 4;
  // Optional: filter by source type (code, trace, or both).
  SourceFilter source_filter = 5;
  // Maximum number of results to return (default 10, max 100).
  int32 limit = 6;
}

message SearchPastWorkResponse {
  repeated PastWorkResult results = 1;
}

message PastWorkResult {
  string chunk_text = 1;
  string source_type = 2;       // "code" or "trace"
  double similarity_score = 3;
  string run_id = 4;
  string file_path = 5;
  string language = 6;
  string node_type = 7;
  string chunk_type = 8;
  string severity = 9;
  string repo_url = 10;
  google.protobuf.Timestamp created_at = 11;
}
