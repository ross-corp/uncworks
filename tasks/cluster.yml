# tasks/cluster.yml — Colima/k3s cluster lifecycle and Temporal dev server (macOS)
version: "3"

vars:
  COLIMA_PROFILE: '{{.COLIMA_PROFILE | default "uncworks"}}'
  CLUSTER_NAMESPACE: '{{.CLUSTER_NAMESPACE | default "aot"}}'

tasks:
  setup:
    desc: Create Colima k3s VM and deploy all UNCWORKS infrastructure and services
    cmds:
      - |
        if ! colima status --profile {{.COLIMA_PROFILE}} 2>/dev/null | grep -q "is running"; then
          echo "Starting Colima VM '{{.COLIMA_PROFILE}}'..."
          colima start --profile {{.COLIMA_PROFILE}} --runtime containerd --kubernetes --cpu 4 --memory 8
        else
          echo "Colima VM '{{.COLIMA_PROFILE}}' already running."
        fi
      - kubectl config use-context colima-{{.COLIMA_PROFILE}}
      - kubectl create namespace {{.CLUSTER_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - task: :k8s:crd
      - task: :k8s:storage
      - task: :k8s:litellm
      - task: :k8s:soft-serve
      - task: :dev:images
      - >-
        helm upgrade --install uncworks ./deploy/helm/aot
        --namespace {{.CLUSTER_NAMESPACE}}
        --set images.controlplane.tag=local
        --set images.controlplane.pullPolicy=Never
        --set images.web.tag=local
        --set images.web.pullPolicy=Never
        --set images.sidecar.tag=local
        --set images.sidecar.pullPolicy=Never
        --set images.init.tag=local
        --set images.init.pullPolicy=Never
        --wait --timeout=5m
      - task: status
      - echo ""
      - echo "Start Temporal dev server in a separate terminal:"
      - echo "  task cluster:temporal:dev"
      - echo ""
      - echo "Port-forward the API server:"
      - echo "  kubectl port-forward svc/uncworks-apiserver 50055:50055 -n {{.CLUSTER_NAMESPACE}}"

  status:
    desc: Show pod and service health in the UNCWORKS namespace
    cmds:
      - kubectl config use-context colima-{{.COLIMA_PROFILE}} 2>/dev/null || true
      - echo "=== Pods ==="
      - kubectl get pods -n {{.CLUSTER_NAMESPACE}} 2>/dev/null || echo "(namespace not found)"
      - echo ""
      - echo "=== Services ==="
      - kubectl get svc -n {{.NAMESPACE}} 2>/dev/null || echo "(none)"
      - echo ""
      - echo "=== Colima status ==="
      - colima status --profile {{.COLIMA_PROFILE}} 2>/dev/null || echo "(colima not running)"

  teardown:
    desc: Delete all UNCWORKS resources and stop the Colima VM
    cmds:
      - kubectl config use-context colima-{{.COLIMA_PROFILE}} 2>/dev/null || true
      - helm uninstall uncworks -n {{.NAMESPACE}} 2>/dev/null || true
      - kubectl delete namespace {{.NAMESPACE}} --ignore-not-found
      - colima stop --profile {{.COLIMA_PROFILE}} 2>/dev/null || true
      - echo "UNCWORKS cluster torn down."

  logs:
    desc: Tail logs from all UNCWORKS pods
    cmds:
      - kubectl config use-context colima-{{.COLIMA_PROFILE}} 2>/dev/null || true
      - kubectl logs -n {{.NAMESPACE}} -l app.kubernetes.io/instance=uncworks --prefix --follow {{.CLI_ARGS}}

  forward:
    desc: Port-forward the apiserver to localhost:50055
    cmds:
      - kubectl config use-context colima-{{.COLIMA_PROFILE}} 2>/dev/null || true
      - kubectl port-forward svc/uncworks-apiserver 50055:50055 -n {{.NAMESPACE}}

  temporal:dev:
    desc: Start Temporal dev server (SQLite, no external deps)
    cmds:
      - temporal server start-dev --db-filename .temporal.db
