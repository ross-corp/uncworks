# CI Pipeline — five-stage test pyramid
#
# Stage 1: Schema Gate     — buf lint + breaking change detection (no infra)
# Stage 2: Unit Tests      — Go unit tests + TS type checks (envtest for CRD tests)
# Stage 3: Lint            — golangci-lint (runs parallel with unit tests)
# Stage 4: Contract Tests  — ConnectRPC server contract + protovalidate (envtest)
# Stage 5: Integration     — testcontainers PostgreSQL (requires Docker) [commented out]
# Stage 6: E2E             — full cluster tests (requires k0s, Temporal, LiteLLM) [commented out]
#
# Infrastructure requirements per stage:
#   schema-gate:     buf CLI only
#   unit-tests:      Go, Node.js 22, setup-envtest
#   lint:            Go, golangci-lint
#   contract-tests:  Go, setup-envtest
#   integration:     Go, Docker (for testcontainers-go PostgreSQL)
#   e2e:             Go, k0s cluster, PostgreSQL, Temporal, LiteLLM/Ollama
#
# Each stage can be run independently via Taskfile targets:
#   task proto:lint        — Stage 1a
#   task proto:breaking    — Stage 1b
#   task test:unit         — Stage 2 (fast, no Docker)
#   task test:contract     — Stage 4
#   task test:integration  — Stage 5 (requires Docker)
#   task test:e2e          — Stage 6 (requires k0s cluster + all deps)
#   task test:all          — All stages sequentially

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  schema-gate:
    name: Schema Gate (buf lint + breaking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
      - run: buf breaking --against '.git#branch=main'
        if: github.event_name == 'pull_request'

  unit-tests:
    name: Unit Tests
    needs: schema-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
      - name: Go tests
        env:
          KUBEBUILDER_ASSETS: ${{ runner.temp }}/envtest
        run: |
          setup-envtest use --print path -p env > "$GITHUB_ENV" || true
          go test ./api/... ./internal/... -count=1
      - name: Shared package tests
        run: |
          cd packages/shared && npm install && npx tsx --test src/**/*.test.ts
      - name: TypeScript type check
        run: |
          cd packages/shared && npx tsc --noEmit
          cd ../pi-aot-extension && npm install && npx tsc --noEmit

  lint:
    name: Lint
    needs: schema-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  contract-tests:
    name: Contract Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Server contract tests
        env:
          KUBEBUILDER_ASSETS: ${{ runner.temp }}/envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          setup-envtest use --print path -p env > "$GITHUB_ENV" || true
          go test ./test/contract/... -count=1 -v

