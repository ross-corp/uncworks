name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Build + Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: latest
          module: ./ci
          call: all --source .

  release:
    name: Release Please
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          # RELEASE_PLEASE_TOKEN must be a repo secret: PAT with contents+pull-requests write.
          # Using a PAT (not GITHUB_TOKEN) so release-please PRs can trigger downstream workflows.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  pre-release-tag:
    name: Pre-release Tag
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pre-release tag
        run: |
          # Read current version from release-please manifest
          CURRENT=$(jq -r '."."' .release-please-manifest.json)

          # Bump patch to get next version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"

          DATE=$(date -u +%Y%m%d)
          SHA=$(git rev-parse --short=7 HEAD)
          TAG="v${NEXT}-pre.${DATE}.${SHA}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Pre-release build: ${TAG}"
          git push origin "$TAG"
          echo "Tagged: $TAG"

  regression:
    name: Regression Tests
    needs: ci
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: latest
          module: ./ci
          call: regression-tests --source .

  app-release:
    name: macOS App Build + DMG
    needs: ci
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build web frontend
        run: |
          npm install --no-save @bufbuild/protobuf@^2.0.0
          cd packages/shared && npm ci
          cd ../../web && npm ci && npm run build
          rsync -a --delete web/dist/ cmd/uncworks-app/frontend/dist/

      - name: Build Wails .app
        run: |
          cd cmd/uncworks-app
          wails build -clean -o UNCWORKS -platform darwin/universal
        env:
          CGO_ENABLED: '1'

      - name: Package DMG
        run: |
          APP="cmd/uncworks-app/build/bin/UNCWORKS.app"
          VERSION="${{ github.ref_name }}"
          DMG_NAME="UNCWORKS-${VERSION}-darwin-universal.dmg"
          # Create a staging directory for the DMG contents
          STAGING=$(mktemp -d)
          cp -r "$APP" "$STAGING/UNCWORKS.app"
          # Symlink /Applications for drag-install UX
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "UNCWORKS ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            "$DMG_NAME"
          echo "DMG_PATH=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: ${{ env.DMG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  edge:
    name: Edge Images
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: latest
          module: ./ci
          call: >-
            push-edge
            --source .
            --registry-user ${{ github.actor }}
            --registry-pass env:GITHUB_TOKEN
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
