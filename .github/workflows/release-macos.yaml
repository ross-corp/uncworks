name: Release macOS DMG

on:
  push:
    tags:
      - "v*"
      - "!v*-pre.*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Build and Upload macOS Universal DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build web frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Copy frontend dist to Wails app
        run: |
          mkdir -p cmd/uncworks-app/frontend/dist
          cp -r web/dist/. cmd/uncworks-app/frontend/dist/

      - name: Build macOS universal app
        run: |
          cd cmd/uncworks-app
          wails build -platform darwin/universal

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          hdiutil create \
            -volname UNCWORKS \
            -srcfolder "cmd/uncworks-app/build/bin/UNCWORKS.app" \
            -ov \
            -format UDZO \
            "UNCWORKS-${VERSION}-darwin-universal.dmg"

      - name: Upload DMG to GitHub Release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "$GITHUB_REF_NAME" "UNCWORKS-${VERSION}-darwin-universal.dmg" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
